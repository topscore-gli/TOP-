<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Waves</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Waves (Chapter 20)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Waves</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 50:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3000,PASS:60}; // 50 minutes for 50 questions

// Section mapping
const SECTIONS={
  0:"A: Production & Propagation",
  15:"B: Classification of Waves",
  30:"C: Characteristics & Properties"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 50 JAMB Physics Waves Questions
const QUIZ_DATA=[
  // Section A: Production and Propagation of Waves (1-15)
  {q:"What is the primary function of a wave?",o:["To transfer matter from one point to another","To transfer energy from one point to another","To create permanent displacement of particles","To increase the density of the medium"],a:1,e:"Waves transfer energy without transferring matter. Particles oscillate about fixed positions but do not travel with the wave."},
  {q:"The equation relating wave velocity, frequency, and wavelength is:",o:["V = f/λ","V = λ/f","V = fλ","V = f + λ"],a:2,e:"The fundamental wave equation is V = fλ, where V is velocity (m/s), f is frequency (Hz), and λ is wavelength (m)."},
  {q:"A wave has a frequency of 100 Hz and wavelength of 2 m. Calculate its velocity.",o:["50 m/s","100 m/s","200 m/s","400 m/s"],a:2,e:"Using V = fλ = 100 × 2 = 200 m/s."},
  {q:"The source of all wave motion is:",o:["Heat","Light","Vibration","Electricity"],a:2,e:"All waves originate from vibrating systems. Without vibration, no wave is produced."},
  {q:"In wave motion, particles of the medium:",o:["Travel with the wave at wave velocity","Oscillate about their fixed mean positions","Are permanently displaced in the direction of wave travel","Remain completely stationary"],a:1,e:"Particles oscillate about fixed positions while the wave disturbance travels through the medium."},
  {q:"A wave travels at 340 m/s with frequency 170 Hz. What is its wavelength?",o:["0.5 m","1.0 m","2.0 m","3.0 m"],a:2,e:"λ = V/f = 340/170 = 2 m."},
  {q:"The wave number k is defined as:",o:["2πf","2π/λ","λ/2π","f/2π"],a:1,e:"Wave number k = 2π/λ, measured in rad/m. It represents the spatial frequency of the wave."},
  {q:"Two points on a wave separated by half a wavelength have a phase difference of:",o:["0°","90°","180°","360°"],a:2,e:"Phase difference = (2π/λ) × Δx. For Δx = λ/2: φ = (2π/λ) × (λ/2) = π rad = 180°."},
  {q:"The progressive wave equation y = A sin(ωt - kx) represents a wave traveling:",o:["In the positive x-direction","In the negative x-direction","In both directions simultaneously","Stationary in space"],a:0,e:"The negative sign before kx indicates wave traveling in the positive x-direction. A positive sign would indicate negative x-direction."},
  {q:"In the equation y = A sin[2π/λ(vt - x)], the term A represents:",o:["Wavelength","Amplitude","Frequency","Velocity"],a:1,e:"A represents amplitude, the maximum displacement from the equilibrium position."},
  {q:"A wave is described by y = 0.4 sin[2π(5t - 0.2x)]. What is its frequency?",o:["0.2 Hz","2 Hz","5 Hz","10 Hz"],a:2,e:"Comparing with y = A sin[2π(ft - x/λ)], the coefficient of t is f = 5 Hz."},
  {q:"What is the angular frequency ω of a wave with period 0.02 s?",o:["50π rad/s","100π rad/s","200π rad/s","400π rad/s"],a:1,e:"ω = 2π/T = 2π/0.02 = 100π rad/s."},
  {q:"The phase difference between two points separated by one full wavelength is:",o:["0°","90°","180°","360°"],a:3,e:"One wavelength corresponds to one complete cycle, which is 360° or 2π radians."},
  {q:"A wave has velocity 400 m/s and wave number 4π rad/m. What is its frequency?",o:["100 Hz","200 Hz","400 Hz","800 Hz"],a:3,e:"From k = 2π/λ, λ = 2π/k = 2π/4π = 0.5 m. Then f = V/λ = 400/0.5 = 800 Hz."},
  {q:"The wave vector points:",o:["Perpendicular to the direction of wave propagation","In the direction of wave propagation","Opposite to the direction of wave propagation","Randomly in all directions"],a:1,e:"The wave vector (or propagation vector) points in the direction of wave travel with magnitude equal to the wave number."},
  
  // Section B: Classification of Waves (16-30)
  {q:"Which of the following is a mechanical wave?",o:["X-rays","Radio waves","Sound waves","Gamma rays"],a:2,e:"Sound waves require a material medium to travel, making them mechanical waves. The others are electromagnetic waves."},
  {q:"Electromagnetic waves can travel through:",o:["Solids only","Liquids only","Gases only","Vacuum"],a:3,e:"Unlike mechanical waves, electromagnetic waves do not require a medium and can travel through vacuum at the speed of light."},
  {q:"In a transverse wave, particles vibrate:",o:["Parallel to the direction of wave travel","Perpendicular to the direction of wave travel","In circular motion","Randomly"],a:1,e:"Transverse waves have particle displacement perpendicular to the direction of wave propagation (e.g., waves on a string)."},
  {q:"Sound waves are examples of:",o:["Transverse waves","Longitudinal waves","Electromagnetic waves","Stationary waves only"],a:1,e:"Sound waves are longitudinal; particles vibrate parallel to the direction of wave travel, creating compressions and rarefactions."},
  {q:"Which wave type consists of crests and troughs?",o:["Longitudinal waves","Transverse waves","Sound waves in air","Compressional waves"],a:1,e:"Transverse waves exhibit crests (highest points) and troughs (lowest points). Longitudinal waves have compressions and rarefactions."},
  {q:"A wave in which particles of the medium move in the same direction as the wave is called:",o:["Transverse wave","Longitudinal wave","Stationary wave","Polarized wave"],a:1,e:"Longitudinal waves have particle vibration parallel to the direction of wave propagation."},
  {q:"Which of the following CANNOT be polarized?",o:["Light waves","Radio waves","Sound waves","X-rays"],a:2,e:"Only transverse waves can be polarized. Sound waves are longitudinal and cannot be polarized."},
  {q:"Stationary waves are produced by:",o:["Reflection of waves at a fixed boundary","Refraction of waves","Diffraction of waves","Polarization of waves"],a:0,e:"Stationary waves result from the superposition of two identical waves traveling in opposite directions, usually from reflection at a boundary."},
  {q:"In a stationary wave, points of maximum amplitude are called:",o:["Nodes","Antinodes","Crests","Compressions"],a:1,e:"Antinodes are points of maximum amplitude. Nodes are points of zero amplitude."},
  {q:"The distance between two consecutive nodes in a stationary wave is:",o:["λ/4","λ/2","λ","2λ"],a:1,e:"Nodes occur at half-wavelength intervals. The distance between consecutive nodes equals λ/2."},
  {q:"A string fixed at both ends vibrates in its fundamental mode. If the string length is 2 m, what is the wavelength?",o:["1 m","2 m","4 m","8 m"],a:2,e:"For fundamental mode: λ = 2L = 2 × 2 = 4 m."},
  {q:"Which property distinguishes progressive waves from stationary waves?",o:["Amplitude variation","Frequency","Wavelength","All of the above"],a:0,e:"Progressive waves have constant amplitude everywhere, while stationary waves have varying amplitude (nodes and antinodes)."},
  {q:"Ripple tank waves are:",o:["Longitudinal waves","Transverse waves","Electromagnetic waves","Sound waves"],a:1,e:"Water waves (ripple tank) are transverse waves—water particles move perpendicular to the wave direction."},
  {q:"Waves on a stretched string are:",o:["Longitudinal","Transverse","Electromagnetic","Compressional"],a:1,e:"Waves on strings are transverse; particles vibrate perpendicular to the string length."},
  {q:"A slinky spring pushed back and forth produces:",o:["Transverse waves","Longitudinal waves","Electromagnetic waves","Polarized waves"],a:1,e:"Pushing a slinky creates compressions and rarefactions—characteristic of longitudinal waves."},
  
  // Section C: Characteristics/Properties of Waves (31-50)
  {q:"When a wave passes from one medium to another, which property remains unchanged?",o:["Velocity","Wavelength","Frequency","Amplitude"],a:2,e:"Frequency is determined by the source and remains constant when a wave changes medium. Velocity and wavelength change."},
  {q:"The bending of waves around obstacles is called:",o:["Reflection","Refraction","Diffraction","Interference"],a:2,e:"Diffraction is the spreading of waves when they encounter obstacles or pass through apertures."},
  {q:"Two waves of frequencies 300 Hz and 304 Hz interfere. What is the beat frequency?",o:["1 Hz","2 Hz","4 Hz","8 Hz"],a:2,e:"Beat frequency = |f₁ - f₂| = |300 - 304| = 4 Hz."},
  {q:"Beats are produced when two waves have:",o:["Same frequency and amplitude","Slightly different frequencies","Same wavelength but different amplitudes","Very different frequencies"],a:1,e:"Beats result from interference of two waves with slightly different frequencies, creating periodic variations in amplitude."},
  {q:"A police siren sounds higher in pitch as it approaches you. This illustrates:",o:["Reflection","Refraction","Doppler effect","Diffraction"],a:2,e:"The Doppler effect causes apparent frequency change when source and observer move relative to each other."},
  {q:"When a wave reflects from a fixed end, it undergoes a phase change of:",o:["0°","90°","180°","360°"],a:2,e:"Reflection from a fixed end causes a 180° (π rad) phase reversal; the wave inverts."},
  {q:"Constructive interference occurs when two waves meet:",o:["180° out of phase","90° out of phase","In phase","With different frequencies"],a:2,e:"Constructive interference (maximum amplitude) occurs when waves are in phase (0° phase difference)."},
  {q:"Plane polarization demonstrates that:",o:["Longitudinal waves can be polarized","Transverse waves can be polarized","All waves can be polarized","Sound waves can be polarized"],a:1,e:"Only transverse waves can be polarized. Polarization restricts vibrations to one plane perpendicular to propagation."},
  {q:"A wave changes direction when entering a different medium. This is:",o:["Reflection","Refraction","Diffraction","Dispersion"],a:1,e:"Refraction is the change in wave direction due to change in velocity when entering a different medium."},
  {q:"Two tuning forks produce 5 beats per second. If one has frequency 440 Hz, the other could be:",o:["435 Hz or 445 Hz","435 Hz only","445 Hz only","880 Hz"],a:0,e:"Beat frequency = |f₁ - f₂|. So 5 = |440 - f₂|, giving f₂ = 435 Hz or 445 Hz."},
  {q:"The superposition principle states that when waves meet:",o:["They destroy each other","They pass through unaffected","The resultant displacement equals the sum of individual displacements","They always produce standing waves"],a:2,e:"Superposition means the net displacement at any point equals the algebraic sum of displacements due to each wave."},
  {q:"A standing wave is formed when:",o:["Two waves travel in the same direction","Two identical waves travel in opposite directions","A wave loses energy","A wave changes frequency"],a:1,e:"Standing waves result from interference of two identical waves traveling in opposite directions."},
  {q:"In a ripple tank, circular waves are produced by:",o:["A straight dipper","A point dipper","A plane wave generator","A barrier"],a:1,e:"A point source (point dipper) produces circular wavefronts that spread outward in all directions."},
  {q:"The wavelength of a wave doubles when entering a new medium. What happens to its velocity?",o:["Halves","Doubles","Remains constant","Quadruples"],a:1,e:"Since frequency remains constant, V = fλ. If λ doubles, V must also double."},
  {q:"An ambulance moves away from a stationary observer. The observer hears:",o:["Higher frequency than emitted","Lower frequency than emitted","The same frequency","No sound"],a:1,e:"Doppler effect: when source recedes, observed frequency decreases (lower pitch)."},
  {q:"Wave diffraction is most noticeable when the obstacle size is:",o:["Much larger than wavelength","Much smaller than wavelength","Comparable to wavelength","Independent of wavelength"],a:2,e:"Diffraction effects are significant when obstacle/aperture size is similar to the wavelength."},
  {q:"A guitar string vibrates with fundamental frequency 200 Hz. The first overtone has frequency:",o:["100 Hz","200 Hz","400 Hz","600 Hz"],a:2,e:"First overtone (second harmonic) = 2 × fundamental = 2 × 200 = 400 Hz."},
  {q:"Which wave property is used in ultrasound medical imaging?",o:["Polarization","Doppler effect","Diffraction","Refraction"],a:1,e:"Doppler ultrasound uses the Doppler effect to measure blood flow and detect movement within the body."},
  {q:"A wave pulse on a string reaches a free end. Upon reflection:",o:["It inverts (phase change of 180°)","It does not invert (no phase change)","It disappears completely","It doubles in amplitude"],a:1,e:"Reflection from a free end produces no phase change; the pulse reflects without inversion."},
  {q:"The speed of sound in air at room temperature is approximately:",o:["34 m/s","340 m/s","3400 m/s","3 × 10⁸ m/s"],a:1,e:"Speed of sound in air at 20°C is approximately 343 m/s, commonly rounded to 340 m/s."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('waves_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('waves_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/50`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('waves_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,15,30,50];
  const sectionNames=["A: Production & Propagation","B: Classification of Waves","C: Characteristics & Properties"];
  
  for(let s=0;s<3;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('waves_quiz_auth');
  sessionStorage.removeItem('waves_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('waves_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('waves_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
</body>
</html>
