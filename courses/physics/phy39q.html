<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Introductory Electronics</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Introductory Electronics (Chapter 39)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Introductory Electronics</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 50:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 50 minutes for 50 questions
const CONFIG={TIME:3000,PASS:60};

// Section mapping for 50 questions (5 sections)
const SECTIONS={
  0:"A: Band Theory & Materials",
  10:"B: Intrinsic & Extrinsic Semiconductors",
  20:"C: p-n Junction & Diodes",
  30:"D: Rectification",
  40:"E: Transistors & Amplification"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 50 JAMB Physics Questions on Introductory Electronics
const QUIZ_DATA=[
  // Section A: Band Theory & Material Classification (1-10)
  {q:"The energy gap between the valence band and conduction band in a semiconductor is approximately",o:["0 eV","1 eV","5 eV","10 eV"],a:1,e:"Semiconductors have a small band gap of about 1 eV (e.g., Silicon = 1.1 eV, Germanium = 0.7 eV), allowing some electrons to jump with moderate energy input."},
  {q:"In which material do the valence band and conduction band overlap?",o:["Semiconductor","Insulator","Conductor","Extrinsic semiconductor"],a:2,e:"In conductors (metals), the valence and conduction bands overlap, allowing free electron movement without energy gap."},
  {q:"The band gap in insulators is typically",o:["Less than 1 eV","Between 1-3 eV","Greater than 5 eV","Zero"],a:2,e:"Insulators have large band gaps (>5 eV), making electron transition to conduction band virtually impossible under normal conditions."},
  {q:"Which property distinguishes a semiconductor from a conductor at absolute zero temperature?",o:["Color","Density","Electrical conductivity","Melting point"],a:2,e:"At 0K, semiconductors behave as insulators (no free electrons), while conductors still conduct electricity due to overlapping bands."},
  {q:"The electrical conductivity of a pure semiconductor increases when",o:["Cooled to low temperature","Heated to higher temperature","Placed in a magnetic field","Subjected to high pressure"],a:1,e:"Heating provides thermal energy for electrons to jump from valence band to conduction band, creating electron-hole pairs and increasing conductivity."},
  {q:"Materials with completely filled valence bands and empty conduction bands separated by a large energy gap are called",o:["Conductors","Semiconductors","Superconductors","Insulators"],a:3,e:"This describes insulators—large band gap prevents electron excitation, resulting in negligible conductivity."},
  {q:"The forbidden energy gap in Germanium at room temperature is approximately",o:["0.3 eV","0.7 eV","1.1 eV","5.0 eV"],a:1,e:"Germanium has a band gap of 0.67 eV (≈0.7 eV), smaller than Silicon's 1.1 eV, making it more conductive at room temperature."},
  {q:"Which of the following statements is TRUE about conductors?",o:["They have a small forbidden energy gap","They have overlapping valence and conduction bands","They have no free electrons at room temperature","Their conductivity decreases with temperature"],a:1,e:"Conductors have overlapping bands or partially filled conduction bands, allowing immediate electron flow without energy barrier."},
  {q:"At room temperature, the number of electron-hole pairs in an intrinsic semiconductor is",o:["Zero","Very large","Relatively small","Infinite"],a:2,e:"At room temperature, only a small fraction of electrons gain enough thermal energy (1 eV) to cross the band gap, creating limited electron-hole pairs."},
  {q:"The conductivity of a semiconductor lies between",o:["10⁻¹⁵ to 10⁻⁸ S/m","10⁻⁵ to 10³ S/m","10⁴ to 10⁸ S/m","10⁸ to 10¹⁵ S/m"],a:1,e:"Semiconductors have intermediate conductivity (10⁻⁵ to 10³ S/m) between insulators (<10⁻⁸ S/m) and conductors (>10⁴ S/m)."},
  
  // Section B: Intrinsic & Extrinsic Semiconductors (11-20)
  {q:"An intrinsic semiconductor at absolute zero temperature behaves as",o:["A conductor","An insulator","A superconductor","A perfect conductor"],a:1,e:"At 0K, no thermal energy exists to excite electrons across the band gap, so no charge carriers are available for conduction."},
  {q:"The process of adding controlled impurities to a pure semiconductor is called",o:["Oxidation","Reduction","Doping","Diffusion"],a:2,e:"Doping introduces impurity atoms to alter the electrical properties of semiconductors, creating n-type or p-type materials."},
  {q:"When a pentavalent impurity is added to a pure semiconductor, it becomes",o:["p-type with holes as majority carriers","n-type with electrons as majority carriers","Intrinsic with equal electrons and holes","An insulator"],a:1,e:"Pentavalent atoms (5 valence electrons) donate extra electrons, making electrons the majority carriers—this is n-type semiconductor."},
  {q:"Trivalent impurities added to a semiconductor create",o:["n-type semiconductor","p-type semiconductor","Intrinsic semiconductor","Metallic conductor"],a:1,e:"Trivalent atoms (3 valence electrons) create holes by accepting electrons, making holes the majority carriers—this is p-type."},
  {q:"In an n-type semiconductor, the minority carriers are",o:["Electrons","Holes","Protons","Neutrons"],a:1,e:"In n-type, electrons are majority carriers (from donor impurities), while holes are minority carriers from thermal generation."},
  {q:"Which of the following is a pentavalent impurity used in doping?",o:["Boron","Aluminum","Gallium","Phosphorus"],a:3,e:"Phosphorus has 5 valence electrons (Group V). Boron, Aluminum, and Gallium are trivalent (Group III)."},
  {q:"The charge carriers in a p-type semiconductor are primarily",o:["Electrons donated by impurity atoms","Holes created by acceptor impurities","Protons from the nucleus","Free neutrons"],a:1,e:"Trivalent acceptor impurities create holes in the valence band that act as positive charge carriers."},
  {q:"An extrinsic semiconductor is formed when",o:["A semiconductor is heated","Impurities are intentionally added to a pure semiconductor","A semiconductor is cooled to absolute zero","Two semiconductors are joined together"],a:1,e:"Extrinsic semiconductors are created by doping pure (intrinsic) semiconductors with specific impurities."},
  {q:"The overall charge of a doped semiconductor is",o:["Positive for n-type, negative for p-type","Negative for n-type, positive for p-type","Neutral","Depends on the amount of doping"],a:2,e:"Doped semiconductors remain electrically neutral because impurity atoms are neutral—the extra electrons or holes balance the ion cores."},
  {q:"In an intrinsic semiconductor, the number of electrons is",o:["Greater than the number of holes","Less than the number of holes","Equal to the number of holes","Zero at room temperature"],a:2,e:"In pure semiconductors, thermal energy creates electron-hole pairs simultaneously, so n = p (intrinsic carrier concentration)."},
  
  // Section C: p-n Junction & Diodes (21-30)
  {q:"The region near the p-n junction devoid of free charge carriers is called",o:["Active region","Depletion region","Avalanche region","Saturation region"],a:1,e:"The depletion region forms when electrons and holes recombine at the junction, leaving immobile ions and no free carriers."},
  {q:"In a p-n junction diode under forward bias, the depletion region",o:["Widens","Narrows","Remains unchanged","Disappears completely"],a:1,e:"Forward bias reduces the barrier potential, allowing majority carriers to cross the junction, which narrows the depletion width."},
  {q:"The potential barrier for a silicon p-n junction at room temperature is approximately",o:["0.3 V","0.7 V","1.1 V","5.0 V"],a:1,e:"Silicon has a built-in potential of 0.7 V. Germanium has 0.3 V due to its smaller band gap."},
  {q:"When a diode is reverse biased, the current that flows is due to",o:["Majority carriers","Minority carriers","Both majority and minority carriers","No current flows at all"],a:1,e:"Reverse bias blocks majority carriers; only thermally generated minority carriers drift across, creating tiny reverse saturation current."},
  {q:"The resistance of a p-n junction diode in forward bias is",o:["Very high","Very low","Infinite","Same as in reverse bias"],a:1,e:"Forward bias offers low resistance (ohms) once the barrier potential is overcome, allowing easy current flow."},
  {q:"Which graph correctly represents the I-V characteristics of a p-n junction diode?",o:["Straight line passing through origin","Exponential curve with sharp increase in forward bias and near-zero reverse current","Parabolic curve symmetric about origin","Horizontal line"],a:1,e:"Diodes show exponential current increase above threshold voltage in forward bias, and minimal current (saturation) in reverse bias until breakdown."},
  {q:"The arrow in the diode symbol points in the direction of",o:["Electron flow","Conventional current flow","Hole movement in reverse bias","Thermal energy flow"],a:1,e:"The diode arrow points from p-side to n-side, indicating the direction of conventional current (positive to negative) in forward bias."},
  {q:"A p-n junction diode conducts when the applied voltage exceeds the",o:["Breakdown voltage","Barrier potential","Saturation voltage","Cut-off voltage"],a:1,e:"The diode conducts significantly only when forward voltage overcomes the barrier potential (0.7V for Si, 0.3V for Ge)."},
  {q:"In reverse bias, a p-n junction diode acts as",o:["A conductor","An open switch","A closed switch","An amplifier"],a:1,e:"Reverse bias blocks current flow (except tiny leakage), making the diode act like an open switch or insulator."},
  {q:"The process of adding impurities to a semiconductor to form p-n junctions is essential for making",o:["Resistors","Capacitors","Diodes and transistors","Inductors"],a:2,e:"Controlled doping creates p-n junctions, the fundamental structure for diodes, transistors, and other semiconductor devices."},
  
  // Section D: Rectification (31-40)
  {q:"A half-wave rectifier uses",o:["One diode","Two diodes","Three diodes","Four diodes"],a:0,e:"Half-wave rectification requires only one diode to block one half of the AC cycle, passing only the positive (or negative) half."},
  {q:"The output frequency of a half-wave rectifier with 50 Hz input is",o:["25 Hz","50 Hz","100 Hz","200 Hz"],a:1,e:"Half-wave rectifier passes one pulse per input cycle, so output frequency equals input frequency (50 Hz)."},
  {q:"A full-wave rectifier with center-tapped transformer uses",o:["One diode","Two diodes","Three diodes","Four diodes"],a:1,e:"The center-tap configuration uses two diodes alternately conducting during each half-cycle of AC input."},
  {q:"The output frequency of a full-wave rectifier with 50 Hz input is",o:["25 Hz","50 Hz","100 Hz","200 Hz"],a:2,e:"Full-wave rectifiers pass two pulses per input cycle (both halves), doubling the frequency to 100 Hz."},
  {q:"A bridge rectifier requires",o:["Two diodes and a center-tapped transformer","Four diodes and no center-tapped transformer","One diode only","Three diodes and a center-tapped transformer"],a:1,e:"Bridge rectifiers use four diodes in a bridge configuration, eliminating the need for expensive center-tapped transformers."},
  {q:"The main advantage of full-wave rectification over half-wave is",o:["Lower cost","Higher output frequency and better efficiency","Simpler circuit","Lower output voltage"],a:1,e:"Full-wave uses both AC halves, providing twice the output frequency, higher average DC voltage, and better efficiency (81.2% vs 40.6%)."},
  {q:"To smooth the output of a rectifier, a  is connected in parallel with the load.",o:["Resistor","Inductor","Capacitor","Transformer"],a:2,e:"A filter capacitor charges during voltage peaks and discharges during troughs, reducing ripple and providing steady DC."},
  {q:"The ripple frequency in a full-wave rectifier with 50 Hz mains supply is",o:["25 Hz","50 Hz","100 Hz","200 Hz"],a:2,e:"Full-wave rectification produces output with twice the input frequency, so ripple is at 100 Hz for 50 Hz input."},
  {q:"Which rectifier has the highest average DC output voltage for the same AC input?",o:["Half-wave rectifier","Full-wave center-tap","Full-wave bridge","Both B and C are equal and higher than A"],a:3,e:"Both full-wave types produce Vdc = 2Vm/π ≈ 0.637Vm, while half-wave produces only Vm/π ≈ 0.318Vm."},
  {q:"In a bridge rectifier, the peak inverse voltage across each diode is",o:["Equal to the peak input voltage (Vm)","Twice the peak input voltage (2Vm)","Half the peak input voltage (Vm/2)","Four times the peak input voltage (4Vm)"],a:0,e:"In bridge configuration, each reverse-biased diode sees the full peak voltage Vm across it, not 2Vm as in center-tap."},
  
  // Section E: Transistors & Amplification (41-50)
  {q:"A transistor is a",o:["Two-terminal device","Three-terminal device","Four-terminal device","Single-terminal device"],a:1,e:"Transistors have three terminals: Emitter (E), Base (B), and Collector (C), enabling control and amplification functions."},
  {q:"In an npn transistor, the emitter is",o:["n-type","p-type","Intrinsic","Metallic"],a:0,e:"npn means n-type emitter, p-type base, n-type collector—sandwich structure with base between two n-regions."},
  {q:"The base of a transistor is deliberately made",o:["Thick and heavily doped","Thin and lightly doped","Thick and lightly doped","Thin and heavily doped"],a:1,e:"The thin, lightly doped base ensures most charge carriers diffuse across to the collector rather than recombining in the base."},
  {q:"In a transistor, the current gain β is defined as the ratio of",o:["Base current to collector current","Collector current to base current","Emitter current to base current","Collector current to emitter current"],a:1,e:"β (current gain) = Ic/Ib, typically 20-200, showing how small base current controls large collector current."},
  {q:"The relationship between emitter current (Ie), base current (Ib), and collector current (Ic) is",o:["Ie = Ib + Ic","Ie = Ib - Ic","Ie = Ib × Ic","Ie = Ib / Ic"],a:0,e:"By Kirchhoff's current law, emitter current equals the sum of base and collector currents: Ie = Ib + Ic."},
  {q:"In a common-emitter configuration, the input is applied between",o:["Collector and emitter","Base and emitter","Collector and base","Emitter and ground only"],a:1,e:"Common-emitter has emitter as common terminal; input signal goes to base-emitter junction, output taken from collector-emitter."},
  {q:"A transistor acts as an amplifier when",o:["Both junctions are forward biased","Both junctions are reverse biased","Emitter-base is forward biased and collector-base is reverse biased","Emitter-base is reverse biased and collector-base is forward biased"],a:2,e:"Active region operation requires forward-biased EB junction (to inject carriers) and reverse-biased CB junction (to collect them)."},
  {q:"The voltage gain of a transistor amplifier depends on",o:["Only the input voltage","The ratio of output resistance to input resistance","Only the base current","The temperature of the transistor"],a:1,e:"Voltage gain Av = β × (Rc/rin) or related to resistance ratio; higher load resistance relative to input resistance gives higher gain."},
  {q:"In a pnp transistor, the majority carriers in the emitter are",o:["Electrons","Holes","Both electrons and holes equally","Ions"],a:1,e:"pnp transistors have p-type emitters where holes are majority carriers, injected into the n-type base."},
  {q:"The primary function of a transistor in electronic circuits is to",o:["Store electric charge","Amplify weak signals and act as a switch","Block all current flow","Convert AC to DC"],a:1,e:"Transistors serve dual purposes: amplification (small input controls large output) and switching (on/off control in digital circuits)."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('electronics_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('electronics_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/50`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('electronics_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=55?'Ready for JAMB!':pct>=48?'Good, review weak areas':pct>=40?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,10,20,30,40,50];
  const sectionNames=["A: Band Theory & Materials","B: Intrinsic & Extrinsic Semiconductors","C: p-n Junction & Diodes","D: Rectification","E: Transistors & Amplification"];
  
  for(let s=0;s<5;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('electronics_quiz_auth');
  sessionStorage.removeItem('electronics_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('electronics_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('electronics_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
</body>
