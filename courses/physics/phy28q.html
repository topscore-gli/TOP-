<script>
// Configuration
const CONFIG={TIME:3600,PASS:60}; // 60 minutes for 60 questions

// Section mapping
const SECTIONS={
  0:"A: Fundamental Concepts & Charging",
  15:"B: The Electroscope",
  25:"C: Coulomb's Law & Electric Force",
  40:"D: Electric Field",
  50:"E: Electric Potential & Lightning"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Physics Electrostatics Questions
const QUIZ_DATA=[
  // Section A: Fundamental Concepts & Charging Methods (1-15)
  {q:"The SI unit of electric charge is the",o:["Ampere","Coulomb","Volt","Ohm","Watt"],a:1,e:"The coulomb (C) is the standard unit of electric charge in SI units, defined as the quantity of charge transferred by a current of 1 ampere in 1 second."},
  {q:"When a glass rod is rubbed with silk, the glass rod becomes positively charged because it",o:["Gains protons","Loses electrons","Gains electrons","Loses protons","Gains neutrons"],a:1,e:"Rubbing transfers electrons. Glass has less affinity for electrons than silk, so it loses electrons and becomes positive while silk gains electrons and becomes negative."},
  {q:"Which of the following methods of charging involves direct contact between objects?",o:["Charging by friction","Charging by induction","Charging by conduction","Charging by polarization","Charging by convection"],a:2,e:"Conduction (contact) charging requires direct physical contact for charge transfer, unlike induction which uses proximity without contact."},
  {q:"A body can be charged negatively by induction using a positively charged rod by",o:["Touching the body with the rod","Bringing the rod near then grounding the body","Rubbing the rod on the body","Heating the body while holding the rod nearby","Placing the rod inside the body"],a:1,e:"Induction requires: bring charged rod near (induces separation), ground the body (allows electron flow), remove ground, then remove rod. Result is opposite charge."},
  {q:"The fundamental charge of an electron is approximately",o:["1.6 Г— 10вЃ»В№вЃ№ C","9.1 Г— 10вЃ»ВіВ№ C","6.6 Г— 10вЃ»ВівЃґ C","9.0 Г— 10вЃ№ C","1.6 Г— 10вЃ»В№вЃ№ J"],a:0,e:"The elementary charge e = 1.6 Г— 10вЃ»В№вЃ№ C. This is the magnitude of charge on an electron (negative) or proton (positive)."},
  {q:"Which particle is responsible for electrical conduction in metals?",o:["Protons","Neutrons","Electrons","Alpha particles","Ions"],a:2,e:"Metals conduct electricity through the movement of free electrons (delocalized electrons in the electron sea), not protons which are fixed in the nucleus."},
  {q:"When two identical conducting spheres with charges +Q and -3Q touch and separate, what is the final charge on each?",o:["+Q and -3Q","-Q each","+2Q each","-2Q each","Zero"],a:1,e:"Total charge = +Q + (-3Q) = -2Q. When identical conductors touch, charge redistributes equally: -2Q Г· 2 = -Q on each sphere."},
  {q:"The process of charging a conductor without direct contact is called",o:["Conduction","Induction","Friction","Convection","Radiation"],a:1,e:"Induction charges an object by bringing a charged object near it (causing charge separation) then grounding, without ever touching the charging rod."},
  {q:"An ebonite rod becomes negatively charged when rubbed with fur because",o:["It loses protons","It gains electrons from the fur","It loses neutrons","The fur becomes positively charged by gaining electrons","It loses positive ions"],a:1,e:"Ebonite has higher electron affinity than fur. Electrons transfer from fur to ebonite, making ebonite negative and fur positive."},
  {q:"Which statement about electric charge is correct?",o:["Charge can be created by friction","Charge is quantized and conserved","A neutral body has no protons or electrons","Like charges attract each other","Charge can be destroyed"],a:1,e:"Charge is quantized (exists in multiples of e) and conserved (total charge in isolated system remains constant). Like charges repel, unlike attract."},
  {q:"When charging by induction, the induced charge on the nearest part of the conductor is always",o:["The same as the inducing charge","Opposite to the inducing charge","Zero","Double the inducing charge","Half the inducing charge"],a:1,e:"A positive rod induces negative charge on near side (attraction) and positive on far side. The induced charge closest to the rod is always opposite."},
  {q:"The charge on a proton is approximately",o:["-1.6 Г— 10вЃ»В№вЃ№ C","+1.6 Г— 10вЃ»В№вЃ№ C","Zero","+9.1 Г— 10вЃ»ВіВ№ C","-9.1 Г— 10вЃ»ВіВ№ C"],a:1,e:"Proton carries the fundamental positive charge +e = +1.6 Г— 10вЃ»В№вЃ№ C, equal in magnitude but opposite in sign to the electron."},
  {q:"A neutral metal sphere is touched by a negatively charged rod. The sphere becomes",o:["Positively charged","Negatively charged","Remains neutral","Discharged","Positively charged then neutral"],a:1,e:"By conduction (contact), excess electrons flow from the negatively charged rod to the neutral sphere until equilibrium, leaving both negative."},
  {q:"Which material is the best electrical insulator?",o:["Copper","Aluminum","Glass","Silver","Gold"],a:2,e:"Glass is an insulator (resists charge flow). Copper, aluminum, and silver are conductors with free electrons that allow charge movement."},
  {q:"The number of electrons in 1 coulomb of charge is approximately",o:["6.25 Г— 10В№вЃё","1.6 Г— 10вЃ»В№вЃ№","9.0 Г— 10вЃ№","6.25 Г— 10В№вЃё","1.6 Г— 10В№вЃ№"],a:0,e:"n = Q/e = 1 C / (1.6 Г— 10вЃ»В№вЃ№ C) = 6.25 Г— 10В№вЃё electrons. This is the reciprocal of the elementary charge."},
  
  // Section B: The Electroscope (16-25)
  {q:"The instrument used for detecting and testing electric charges is called",o:["Barometer","Thermometer","Electroscope","Ammeter","Voltmeter"],a:2,e:"An electroscope detects charge through the divergence of its gold leaf (or aluminum vane) when charged."},
  {q:"When a negatively charged rod is brought near the cap of a positively charged electroscope, the leaf",o:["Diverges more","Collapses","Remains unchanged","Breaks","Rotates"],a:1,e:"Opposite charges attract. Negative rod attracts positive charges to the cap, reducing positive charge on the leaf, causing it to collapse partially or fully."},
  {q:"The gold leaf of an electroscope diverges when the cap is touched with a charged object because",o:["The leaf gains weight","Like charges on the leaf and rod repel","Heat causes expansion","Air pressure increases","Gravity decreases"],a:1,e:"Charge transfers to the leaf and metal rod. Since they have like charges, they repel each other, causing the leaf to rise/diverge."},
  {q:"An electroscope can be used to",o:["Measure current in a circuit","Detect the presence of charge","Measure temperature","Measure atmospheric pressure","Measure voltage"],a:1,e:"Primary use of electroscope is charge detection. It can also test charge type and compare magnitudes but cannot measure current, temperature, or pressure."},
  {q:"To charge an electroscope negatively by induction, you should",o:["Touch the cap with a positive rod","Bring a positive rod near, then ground the cap","Bring a negative rod near, then ground the cap","Rub the cap with silk","Heat the cap"],a:1,e:"To charge negatively by induction, use a positive rod: it induces negative on cap/leaf, grounding allows electrons to enter, remove ground, remove rod = negative electroscope."},
  {q:"The divergence of the gold leaf in an electroscope increases when",o:["More charge is added","Charge is removed","Humidity increases","Air pressure decreases","Temperature decreases"],a:0,e:"Greater charge = greater electrostatic repulsion between leaf and rod = greater divergence. Humidity causes charge leakage, reducing divergence."},
  {q:"An electroscope leaf collapses when a charged object is brought near the cap if the object has",o:["The same charge as the electroscope","Opposite charge to the electroscope","No charge","A larger mass","A smaller mass"],a:1,e:"Opposite charges attract. If electroscope is positive and negative rod approaches, electrons are attracted to cap, reducing positive charge on leaf, causing collapse."},
  {q:"The metal case of a gold-leaf electroscope is earthed to",o:["Increase its sensitivity","Protect it from external electric fields","Make it heavier","Allow it to measure current","Increase its charge"],a:1,e:"The earthed case shields the internal mechanism from external fields and prevents induced charges on the case from affecting the leaf."},
  {q:"When testing a charge with an electroscope, if the leaf diverges further when a known negative charge is brought near, the unknown charge is",o:["Positive","Negative","Neutral","Zero","Variable"],a:1,e:"If leaf diverges more with negative rod, the electroscope already had negative charge (like charges repel, pushing more charge to leaf)."},
  {q:"An uncharged electroscope has its leaf",o:["Fully diverged","Partially raised","Collapsed (vertical)","Broken","Bent"],a:2,e:"With no charge, there is no repulsion between leaf and rod, so the leaf hangs vertically downward (collapsed position)."},
  
  // Section C: Coulomb's Law & Electric Force (26-40)
  {q:"The force between two point charges is governed by",o:["Newton's law","Coulomb's law","Ohm's law","Faraday's law","Ampere's law"],a:1,e:"Coulomb's law states F = kqв‚Ѓqв‚‚/rВІ, describing the electrostatic force between two point charges."},
  {q:"Two charges of +4ОјC and +6ОјC are placed 0.3m apart in air. Calculate the force between them. [k = 9 Г— 10вЃ№ NmВІCвЃ»ВІ]",o:["2.4 N","1.2 N","0.8 N","3.6 N","4.8 N"],a:0,e:"F = (9Г—10вЃ№)(4Г—10вЃ»вЃ¶)(6Г—10вЃ»вЃ¶)/(0.3)ВІ = (216Г—10вЃ»Ві)/0.09 = 2.4 N (repulsive)."},
  {q:"If the distance between two charges is doubled, the force between them becomes",o:["Doubled","Halved","One-quarter","Four times","Unchanged"],a:2,e:"F в€ќ 1/rВІ. If r в†’ 2r, F в†’ F/4. This is the inverse square law."},
  {q:"Two identical charges repel with force F. If each charge is doubled and distance halved, the new force is",o:["F","4F","8F","16F","2F"],a:3,e:"F_new = k(2q)(2q)/(r/2)ВІ = 4kqВІ/(rВІ/4) = 16kqВІ/rВІ = 16F."},
  {q:"The force between charges of +2ОјC and -8ОјC separated by 0.4m is",o:["0.9 N attractive","0.9 N repulsive","1.8 N attractive","1.8 N repulsive","0.45 N attractive"],a:0,e:"F = (9Г—10вЃ№)(2Г—10вЃ»вЃ¶)(8Г—10вЃ»вЃ¶)/(0.4)ВІ = 144Г—10вЃ»Ві/0.16 = 0.9 N. Opposite charges attract."},
  {q:"Two charges +Q and -Q are placed at a distance d apart. The force between them is F. If the distance is increased to 3d, the force becomes",o:["F/3","F/9","3F","9F","F/27"],a:1,e:"F в€ќ 1/dВІ. New distance = 3d, so new force = F/(3)ВІ = F/9."},

  {q:"Two identical metal spheres with charges +6ОјC and -2ОјC touch and separate. What is the force between them when placed 10cm apart?",o:["3.6 N attractive","3.6 N repulsive","1.8 N attractive","1.8 N repulsive","0.9 N repulsive"],a:1,e:"After contact: total charge = +4ОјC, each gets +2ОјC. F = (9Г—10вЃ№)(2Г—10вЃ»вЃ¶)ВІ/(0.1)ВІ = 3.6 N (repulsive, like charges)."},
  {q:"If the electrostatic force between two charges is 4F when separated by distance d in air, what is the force when placed in a medium with dielectric constant 2 at the same distance?",o:["8F","4F","2F","F","F/2"],a:2,e:"In medium, F' = F/ОµбµЈ. With ОµбµЈ = 2, F' = 4F/2 = 2F. The medium reduces the force by factor of dielectric constant."},

  {q:"The direction of the electric field at a point is",o:["The direction a negative charge would move","The direction a positive test charge would move","Perpendicular to the force on a charge","Always toward the source charge","Always away from the source charge"],a:1,e:"By convention, electric field direction is the direction of force on a positive test charge (away from +, toward -)."},

  {q:"Two point charges +Q and -Q form an electric dipole. The electric field at the midpoint between them",o:["Is zero","Points from +Q to -Q","Points from -Q to +Q","Is perpendicular to the line joining them","Is maximum"],a:1,e:"At midpoint, fields from both charges point same direction (from + to -), so they add up, pointing from positive to negative charge."},
  {q:"The electric field intensity due to a uniformly charged sphere at an external point is the same as if all the charge were concentrated",o:["At the surface","At the center","Uniformly throughout the volume","At two points","At four points"],a:1,e:"By Gauss's law, a uniformly charged sphere behaves like a point charge at its center for external points (shell theorem)."},

  {q:"The work done in moving a charge of 5ОјC through a potential difference of 100V is",o:["0.5 J","5 Г— 10вЃ»вЃґ J","20 J","500 J","5 Г— 10вЃ»ВІ J"],a:1,e:"W = qV = (5Г—10вЃ»вЃ¶ C)(100 V) = 5Г—10вЃ»вЃґ J = 0.5 mJ."},

  {q:"During a lightning discharge, the cloud and ground act as",o:["Two insulators","Two conductors with potential difference","A single conductor","Two magnets","Two semiconductors"],a:1,e:"Charge separation in clouds creates potential difference with ground. When breakdown voltage of air is exceeded, discharge occurs."},
  {q:"The potential at a distance r from a point charge Q varies as",o:["r","rВІ","1/r","1/rВІ","в€љr"],a:2,e:"V = kQ/r, so V в€ќ 1/r. This is inverse relationship (not inverse square like force and field)."}

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('electrostatics_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('electrostatics_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`вЏ±пёЏ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} вЂў Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz вњ“':'Next в†’';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('electrostatics_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'рџЋ‰ Excellent!':timeout?'вЏ° Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'вњ“ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,15,25,40,50,60];
  const sectionNames=["A: Fundamental Concepts & Charging","B: The Electroscope","C: Coulomb's Law & Electric Force","D: Electric Field","E: Electric Potential & Lightning"];
  
  for(let s=0;s<5;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('electrostatics_quiz_auth');
  sessionStorage.removeItem('electrostatics_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('electrostatics_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('electrostatics_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
