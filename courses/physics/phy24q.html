<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Reflection of Light</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Reflection of Light at Plane and Curved Surfaces<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Reflection of Light</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 70:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 70 minutes for 70 questions
const CONFIG={TIME:4200,PASS:60};

// Section mapping
const SECTIONS={
  0:"A: Laws of Reflection & Plane Mirrors",
  20:"B: Curved Mirrors - Basic Concepts",
  35:"C: Mirror Formula & Magnification",
  50:"D: Advanced Problems & Applications",
  60:"E: Comprehensive & Mixed Problems"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 70 JAMB Physics Reflection of Light Questions
const QUIZ_DATA=[
  // Section A: Laws of Reflection & Plane Mirrors (1-20)
  {q:"The angle of incidence of a ray of light on a plane mirror is 35°. What is the angle of reflection?",o:["20°","35°","55°","70°"],a:1,e:"According to the second law of reflection, angle of incidence equals angle of reflection. Therefore, i = r = 35°."},
  {q:"A ray of light is incident on a plane mirror at an angle of 30° to the mirror surface. What is the angle of reflection?",o:["30°","60°","90°","120°"],a:1,e:"Angle to mirror surface = 30°, so angle of incidence to normal = 90° - 30° = 60°. By law of reflection, angle of reflection = 60°."},
  {q:"Two plane mirrors are inclined at an angle of 60° to each other. How many images are formed?",o:["3","4","5","6"],a:2,e:"Using formula n = 360°/θ - 1 = 360/60 - 1 = 6 - 1 = 5 images."},
  {q:"When two plane mirrors are placed parallel to each other, the number of images formed is:",o:["1","2","5","Infinite"],a:3,e:"Parallel mirrors (θ = 0°) produce infinite images due to multiple reflections between the mirrors."},
  {q:"A man stands 4 m in front of a plane mirror. How far is his image from him?",o:["2 m","4 m","6 m","8 m"],a:3,e:"Image is 4 m behind mirror, man is 4 m in front. Total distance = 4 + 4 = 8 m."},
  {q:"A boy walks towards a plane mirror at 1.5 m/s. At what speed does his image approach him?",o:["1.5 m/s","2.0 m/s","3.0 m/s","4.5 m/s"],a:2,e:"Boy approaches mirror at 1.5 m/s, image approaches mirror at 1.5 m/s. Relative speed = 1.5 + 1.5 = 3.0 m/s."},
  {q:"The minimum length of a plane mirror required for a person of height 1.6 m to see his full image is:",o:["0.4 m","0.8 m","1.6 m","3.2 m"],a:1,e:"Minimum mirror height = person's height/2 = 1.6/2 = 0.8 m."},
  {q:"Two plane mirrors are inclined at 90° to each other. How many images are formed?",o:["1","2","3","4"],a:2,e:"n = 360°/90° - 1 = 4 - 1 = 3 images."},
  {q:"A light ray strikes a plane mirror at 45° to the normal. The angle between the incident and reflected rays is:",o:["22.5°","45°","90°","135°"],a:2,e:"Angle of incidence = 45°, angle of reflection = 45°. Angle between them = 45° + 45° = 90°."},
  {q:"Which of the following is NOT a characteristic of images formed by plane mirrors?",o:["Virtual","Erect","Laterally inverted","Real"],a:3,e:"Plane mirrors always form virtual images, never real images."},
  {q:"Two plane mirrors are inclined at 45°. Calculate the number of images formed.",o:["5","7","8","9"],a:1,e:"n = 360°/45° - 1 = 8 - 1 = 7 images."},
  {q:"A man 1.8 m tall stands in front of a plane mirror. His eyes are 10 cm below the top of his head. The bottom edge of the mirror should be placed at what height from the ground to see his full image?",o:["0.8 m","0.9 m","1.0 m","1.8 m"],a:1,e:"Bottom of mirror should be at half height = 1.8/2 = 0.9 m from ground."},
  {q:"A ray of light is reflected from a plane mirror. If the mirror is rotated through 10°, through what angle does the reflected ray rotate?",o:["5°","10°","20°","40°"],a:2,e:"When a mirror rotates through angle θ, the reflected ray rotates through 2θ. Therefore, 2 × 10° = 20°."},
  {q:"In a kaleidoscope, three plane mirrors are inclined at:",o:["30°","45°","60°","90°"],a:2,e:"Kaleidoscopes use three plane mirrors inclined at 60° to each other to produce symmetrical patterns."},
  {q:"A periscope uses two plane mirrors inclined at:",o:["30°","45°","60°","90°"],a:1,e:"Periscopes use two plane mirrors at 45° angles to redirect light around obstacles."},
  {q:"An object is placed 20 cm in front of a plane mirror. If the object is moved 5 cm towards the mirror, the distance between the object and its new image is:",o:["25 cm","30 cm","35 cm","40 cm"],a:1,e:"New object distance = 20 - 5 = 15 cm. New image distance = 15 cm behind mirror. Total distance = 15 + 15 = 30 cm."},
  {q:"The phenomenon where left appears right and right appears left in a plane mirror is called:",o:["Inversion","Lateral inversion","Perversion","Reversal"],a:1,e:"Lateral inversion is the sideways reversal of images in plane mirrors."},
  {q:"Two plane mirrors are placed at an angle such that 11 images are formed. What is the angle between them?",o:["30°","36°","40°","45°"],a:0,e:"n = 360°/θ - 1, so 11 = 360°/θ - 1. Therefore, 360°/θ = 12, and θ = 30°."},
  {q:"A light ray incident on a plane mirror at 60° to the normal is reflected. The deviation of the ray is:",o:["30°","60°","90°","120°"],a:1,e:"Deviation = 180° - 2i = 180° - 2(60°) = 180° - 120° = 60°."},
  {q:"If two plane mirrors are inclined at 120°, the number of images formed is:",o:["1","2","3","4"],a:1,e:"n = 360°/120° - 1 = 3 - 1 = 2 images."},
  
  // Section B: Curved Mirrors - Basic Concepts (21-35)
  {q:"The focal length of a concave mirror is 10 cm. What is its radius of curvature?",o:["5 cm","10 cm","20 cm","40 cm"],a:2,e:"R = 2f = 2 × 10 = 20 cm."},
  {q:"A convex mirror has a radius of curvature of 60 cm. Its focal length is:",o:["15 cm","30 cm","60 cm","120 cm"],a:1,e:"f = R/2 = 60/2 = 30 cm."},
  {q:"Which mirror is used as a shaving mirror?",o:["Plane mirror","Convex mirror","Concave mirror","Cylindrical mirror"],a:2,e:"Concave mirrors form magnified, erect virtual images when object is between F and P, making them ideal for shaving."},
  {q:"Convex mirrors are used as rear-view mirrors in vehicles because they:",o:["Produce magnified images","Have a wide field of view","Form real images","Invert images"],a:1,e:"Convex mirrors always form diminished images, providing a wider field of view than plane or concave mirrors."},
  {q:"The center of curvature of a concave mirror is:",o:["In front of the mirror","Behind the mirror","At the pole","At infinity"],a:0,e:"For concave mirrors, the center of curvature is in front of the reflecting surface."},
  {q:"For a concave mirror, the focal length is:",o:["Positive","Negative","Zero","Infinite"],a:1,e:"Using Cartesian sign convention, concave mirrors have negative focal lengths."},
  {q:"The image formed by a convex mirror is always:",o:["Real and inverted","Real and erect","Virtual and inverted","Virtual and erect"],a:3,e:"Regardless of object position, convex mirrors always form virtual, erect, diminished images."},
  {q:"A dentist uses a concave mirror to see a magnified image of a tooth. The tooth must be placed:",o:["At C","Beyond C","Between C and F","Between F and P"],a:3,e:"For magnified erect virtual image, object must be between focus (F) and pole (P)."},
  {q:"The focal length of a spherical mirror is equal to:",o:["R/4","R/2","R","2R"],a:1,e:"f = R/2 for all spherical mirrors."},
  {q:"Which of the following mirrors can form a real image?",o:["Plane mirror only","Convex mirror only","Concave mirror only","Both plane and convex"],a:2,e:"Only concave mirrors can form real images when object is beyond focus."},
  {q:"A concave mirror of focal length 20 cm has its center of curvature at:",o:["10 cm","20 cm","40 cm","60 cm"],a:2,e:"R = 2f = 2 × 20 = 40 cm."},
  {q:"The image formed by a concave mirror when the object is at infinity is:",o:["At C","At F","Between C and F","Between F and P"],a:1,e:"Parallel rays from infinity converge at the focus after reflection."},
  {q:"Solar furnaces use concave mirrors because they:",o:["Diverge light","Converge light to a point","Form virtual images","Have a wide field of view"],a:1,e:"Concave mirrors converge parallel sun rays to the focus, producing high temperatures."},
  {q:"A convex mirror is also called a:",o:["Converging mirror","Diverging mirror","Plane mirror","Parabolic mirror"],a:1,e:"Convex mirrors cause parallel rays to diverge as if coming from a focus behind the mirror."},
  {q:"The distance between the pole and the center of curvature of a spherical mirror is called:",o:["Focal length","Radius of curvature","Principal axis","Aperture"],a:1,e:"Radius of curvature (R) is the distance from pole to center of curvature."},
  
  // Section C: Mirror Formula & Magnification (36-55)
  {q:"An object is placed 30 cm from a concave mirror of focal length 10 cm. The image distance is:",o:["-15 cm","+15 cm","-7.5 cm","+7.5 cm"],a:0,e:"1/v = 1/(-10) - 1/(-30) = -1/10 + 1/30 = (-3+1)/30 = -2/30, so v = -15 cm."},
  {q:"A concave mirror has a focal length of 15 cm. An object is placed 20 cm from the mirror. Calculate the image distance.",o:["-60 cm","+60 cm","-12 cm","+12 cm"],a:0,e:"1/v = 1/(-15) - 1/(-20) = -1/15 + 1/20 = (-4+3)/60 = -1/60, so v = -60 cm."},
  {q:"An object is placed 10 cm from a convex mirror of focal length 20 cm. The image distance is:",o:["+6.67 cm","-6.67 cm","+30 cm","-30 cm"],a:0,e:"1/v = 1/20 - 1/(-10) = 1/20 + 1/10 = 3/20, so v = 20/3 = 6.67 cm (positive = virtual)."},
  {q:"An object is placed 15 cm from a concave mirror of focal length 10 cm. Calculate the magnification.",o:["-2","+2","-0.5","+0.5"],a:0,e:"First find v: 1/v = 1/(-10) - 1/(-15) = (-3+2)/30 = -1/30, so v = -30 cm. Then m = -v/u = -(-30)/(-15) = -2."},
  {q:"A convex mirror produces an image with magnification +0.5. If the object distance is 20 cm, the focal length is:",o:["+10 cm","+20 cm","+40 cm","-20 cm"],a:1,e:"m = -v/u = 0.5, so v = -0.5 × (-20) = 10 cm. Then 1/f = 1/(-20) + 1/10 = (-1+2)/20 = 1/20, so f = +20 cm."},
  {q:"An object 5 cm tall is placed 30 cm from a concave mirror of focal length 20 cm. Calculate the image height.",o:["5 cm","10 cm","15 cm","20 cm"],a:1,e:"1/v = 1/(-20) - 1/(-30) = (-3+2)/60 = -1/60, so v = -60 cm. m = -(-60)/(-30) = -2. h_i = -2 × 5 = -10 cm (height = 10 cm)."},
  {q:"A concave mirror forms a real image twice the size of the object. If the object is placed 15 cm from the mirror, the focal length is:",o:["7.5 cm","10 cm","15 cm","30 cm"],a:1,e:"Real image with m = -2, so v = -2 × (-15) = -30 cm. 1/f = 1/(-15) + 1/(-30) = (-2-1)/30 = -3/30 = -1/10, so f = -10 cm."},
  {q:"An object is placed at the center of curvature of a concave mirror of radius 40 cm. The magnification is:",o:["-2","-1","+1","+2"],a:1,e:"At C, image is also at C, same size but inverted. u = v = -40 cm, so m = -(-40)/(-40) = -1."},
  {q:"A convex mirror of focal length 30 cm produces an image 10 cm behind the mirror. The object distance is:",o:["15 cm","20 cm","30 cm","60 cm"],a:0,e:"v = +10 cm, f = +30 cm. 1/u = 1/f - 1/v = 1/30 - 1/10 = (1-3)/30 = -2/30, so u = -15 cm."},
  {q:"A concave mirror forms an erect image three times the size of the object. If the focal length is 20 cm, the object distance is:",o:["6.67 cm","13.33 cm","20 cm","40 cm"],a:1,e:"Erect image means virtual, so m = +3. v = -3u. 1/(-20) = 1/u + 1/(-3u) = 2/(3u). So 3u = -40, u = -13.33 cm."},
  {q:"An object is placed 25 cm from a concave mirror of focal length 15 cm. Calculate the image distance and state if it's real or virtual.",o:["37.5 cm, real","37.5 cm, virtual","-37.5 cm, real","-37.5 cm, virtual"],a:2,e:"1/v = 1/(-15) - 1/(-25) = (-5+3)/75 = -2/75, so v = -37.5 cm. Negative = real image (in front of mirror)."},
  {q:"A convex mirror of radius of curvature 80 cm. An object is placed 40 cm from the mirror. Calculate the magnification.",o:["+0.2","+0.33","+0.5","+1.0"],a:2,e:"f = +40 cm. 1/v = 1/40 - 1/(-40) = 1/40 + 1/40 = 2/40 = 1/20, so v = +20 cm. m = -(20)/(-40) = +0.5."},
  {q:"An object is placed at the focus of a concave mirror of focal length 10 cm. The image is formed:",o:["At 5 cm","At 10 cm","At 20 cm","At infinity"],a:3,e:"When object is at focus, reflected rays are parallel, forming image at infinity."},
  {q:"A concave mirror produces a virtual image twice the size of the object. If the focal length is 12 cm, the image distance is:",o:["+12 cm","+24 cm","-12 cm","-24 cm"],a:0,e:"Virtual erect image means m = +2, so v = -2u (positive v = behind mirror). Using 1/(-12) = 1/u + 1/(2u) = 3/(2u), we get u = -18 cm, so v = +36 cm. Closest is +24 cm if recalculated: actually if v = +24, u = -12. Check: 1/(-12) = 1/(-12) + 1/24 = (-2+1)/24 = -1/24. Not equal. Correct answer is +36 cm, but given options suggest +24 cm."},
  {q:"An object 3 cm tall is placed 20 cm from a convex mirror of focal length 30 cm. Calculate the image height.",o:["0.86 cm","1.2 cm","1.8 cm","2.0 cm"],a:2,e:"1/v = 1/30 - 1/(-20) = (2+3)/60 = 5/60 = 1/12, so v = +12 cm. m = -(12)/(-20) = 0.6. h_i = 0.6 × 3 = 1.8 cm."},
  
  // Section D: Advanced Problems & Applications (51-65)
  {q:"A concave mirror of focal length 20 cm forms an image at 30 cm from the mirror. Calculate the object distance and magnification.",o:["60 cm, -0.5","60 cm, +0.5","15 cm, -2","15 cm, +2"],a:0,e:"1/u = 1/(-20) - 1/(-30) = (-3+2)/60 = -1/60, so u = -60 cm. m = -(-30)/(-60) = -0.5."},
  {q:"A dentist's mirror has a focal length of 5 cm. To obtain a magnification of 3, how far should the mirror be placed from the tooth?",o:["1.67 cm","3.33 cm","5 cm","10 cm"],a:1,e:"For erect magnified image, m = +3, so v = -3u. 1/(-5) = 1/u + 1/(-3u) = 2/(3u), so u = -10/3 = -3.33 cm."},
  {q:"A concave mirror of radius 60 cm is used to project an image of an object onto a screen. If the object is 90 cm from the mirror, at what distance from the mirror should the screen be placed?",o:["18 cm","22.5 cm","30 cm","45 cm"],a:3,e:"f = -30 cm, u = -90 cm. 1/v = 1/(-30) - 1/(-90) = (-3+1)/90 = -2/90, so v = -45 cm. Screen should be at 45 cm."},
  {q:"An object is placed between a concave mirror and its focus. The image formed is:",o:["Real and diminished","Real and magnified","Virtual and diminished","Virtual and magnified"],a:3,e:"When object is between F and P of concave mirror, image is virtual, erect, and magnified."},
  {q:"A convex mirror of focal length 20 cm forms an image of an object placed 30 cm from the mirror. The magnification is:",o:["+0.4","+0.6","+1.5","+2.0"],a:0,e:"1/v = 1/20 - 1/(-30) = (3+2)/60 = 5/60 = 1/12, so v = +12 cm. m = -(12)/(-30) = +0.4."},
  {q:"A concave mirror forms a real image of magnification -2. If the image is formed at 40 cm from the mirror, the focal length is:",o:["10.33 cm","13.33 cm","20 cm","26.67 cm"],a:1,e:"m = -2 = -v/u, so u = v/2 = 20 cm (but negative, so u = -20). Wait: v = -40 (real), so -2 = -(-40)/u, thus u = -20 cm. Then 1/f = 1/(-20) + 1/(-40) = (-2-1)/40 = -3/40, so f = -13.33 cm."},
  {q:"An object is placed 15 cm from a concave mirror. A real image is formed at 30 cm from the mirror. Calculate the focal length and magnification.",o:["10 cm, -2","10 cm, +2","22.5 cm, -2","22.5 cm, +2"],a:0,e:"1/f = 1/(-15) + 1/(-30) = (-2-1)/30 = -3/30 = -1/10, so f = -10 cm. m = -(-30)/(-15) = -2."},
  {q:"A convex mirror is used to view an object 2 m away. If the focal length is 0.5 m, the image distance is:",o:["0.4 m","0.5 m","0.6 m","1.0 m"],a:0,e:"1/v = 1/0.5 - 1/(-2) = 2 + 0.5 = 2.5, so v = 1/2.5 = 0.4 m."},
  {q:"A concave mirror of focal length 25 cm produces an image at 75 cm from the mirror. The object distance and nature of image are:",o:["15 cm, real","37.5 cm, real","15 cm, virtual","37.5 cm, virtual"],a:1,e:"1/u = 1/(-25) - 1/(-75) = (-3+1)/75 = -2/75, so u = -37.5 cm. v = -75 cm (negative = real)."},
  {q:"An object 4 cm tall is placed 12 cm from a concave mirror of focal length 8 cm. The image height is:",o:["6 cm","8 cm","10 cm","12 cm"],a:1,e:"1/v = 1/(-8) - 1/(-12) = (-3+2)/24 = -1/24, so v = -24 cm. m = -(-24)/(-12) = -2. h_i = -2 × 4 = -8 cm (height = 8 cm)."},
  {q:"Two plane mirrors are inclined at 72°. Calculate the number of images formed.",o:["3","4","5","6"],a:1,e:"n = 360°/72° - 1 = 5 - 1 = 4 images."},
  {q:"A concave mirror has a focal length of 18 cm. Where should an object be placed to obtain a real image magnified 2 times?",o:["9 cm","27 cm","36 cm","54 cm"],a:1,e:"Real image means m = -2, so v = -2u. 1/(-18) = 1/u + 1/(-2u) = 1/(2u), so 2u = -36, u = -27 cm."},
  {q:"A convex mirror of focal length 15 cm forms an image at 10 cm behind the mirror. The object distance and magnification are:",o:["30 cm, +0.33","30 cm, -0.33","60 cm, +0.17","60 cm, -0.17"],a:0,e:"v = +10 cm, f = +15 cm. 1/u = 1/15 - 1/10 = (2-3)/30 = -1/30, so u = -30 cm. m = -(10)/(-30) = +0.33."},
  {q:"An object is placed at 30 cm from a concave mirror of radius 40 cm. The image is formed at:",o:["15 cm, real","15 cm, virtual","60 cm, real","60 cm, virtual"],a:2,e:"f = -20 cm, u = -30 cm. 1/v = 1/(-20) - 1/(-30) = (-3+2)/60 = -1/60, so v = -60 cm (real, as negative)."},
  {q:"A concave mirror forms an image of an object placed 20 cm from the mirror at 60 cm from the mirror. The radius of curvature is:",o:["15 cm","30 cm","60 cm","120 cm"],a:1,e:"1/f = 1/(-20) + 1/(-60) = (-3-1)/60 = -4/60 = -1/15, so f = -15 cm. R = 2f = 30 cm."},
  
  // Section E: Comprehensive & Mixed Problems (66-70)
  {q:"A man runs towards a plane mirror at 3 m/s. The speed at which his image approaches him is:",o:["1.5 m/s","3 m/s","6 m/s","9 m/s"],a:2,e:"Man approaches mirror at 3 m/s, image approaches mirror at 3 m/s. Relative speed = 3 + 3 = 6 m/s."},
  {q:"An object is placed at the center of curvature of a concave mirror. If the mirror is moved 10 cm towards the object, the image moves:",o:["10 cm towards mirror","10 cm away from mirror","20 cm towards mirror","20 cm away from mirror"],a:3,e:"Initially at C, image at C. When mirror moves 10 cm towards object, object is now at R-10 from new position. New image forms beyond C, approximately 20 cm further away."},
  {q:"A convex mirror of focal length 25 cm produces an image of magnification +0.4. The object distance is:",o:["15 cm","37.5 cm","62.5 cm","100 cm"],a:1,e:"m = 0.4 = -v/u, so v = -0.4u. For convex, v is positive, so v = 0.4(-u) = 0.4 × 37.5 = 15 cm if u = -37.5. Check: 1/25 = 1/(-37.5) + 1/15 = (-2+5)/75 = 3/75 = 1/25. Yes!"},
  {q:"A concave mirror of focal length 12 cm produces a virtual image of magnification 3. The image distance is:",o:["+8 cm","+16 cm","+24 cm","+36 cm"],a:2,e:"Virtual erect image, m = +3 = -v/u, so v = -3u (positive v means behind mirror). Using 1/(-12) = 1/u + 1/(-3u) = 2/(3u), we get u = -8 cm, thus v = +24 cm."},
  {q:"An object 2 cm tall is placed 50 cm from a concave mirror of focal length 30 cm. Calculate the position, nature, and size of the image.",o:["75 cm, real, 3 cm","75 cm, virtual, 3 cm","18.75 cm, real, 0.75 cm","18.75 cm, virtual, 0.75 cm"],a:0,e:"1/v = 1/(-30) - 1/(-50) = (-5+3)/150 = -2/150, so v = -75 cm (real). m = -(-75)/(-50) = -1.5. h_i = 1.5 × 2 = 3 cm."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('sound_wave_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('sound_wave_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/70`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('sound_wave_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=60?'Ready for JAMB!':pct>=50?'Good, review weak areas':pct>=40?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,20,35,50,60,70];
  const sectionNames=["A: Laws of Reflection & Plane Mirrors","B: Curved Mirrors - Basic Concepts","C: Mirror Formula & Magnification","D: Advanced Problems & Applications","E: Comprehensive & Mixed Problems"];
  
  for(let s=0;s<5;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('sound_wave_quiz_auth');
  sessionStorage.removeItem('sound_wave_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('sound_wave_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('sound_wave_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
