<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Change of State</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Change of State (Chapter 16)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Change of State</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 50:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3000,PASS:60}; // 50 minutes for 50 questions

// Section mapping
const SECTIONS={
  0:"A: Conceptual Understanding",
  20:"B: Calculations",
  40:"C: Application & Theory"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 50 JAMB Physics Change of State Questions
const QUIZ_DATA=[
  // Section A: Conceptual Understanding (1-20)
  {q:"The specific latent heat of fusion of a substance is the heat required to",o:["change 1kg of the substance from solid to liquid","change 1kg of the substance from liquid to gas","raise the temperature of 1kg of the substance by 1K","change the state of the substance at any temperature"],a:0,e:"Specific latent heat of fusion is the heat required to change 1kg of solid to liquid at constant temperature (melting point)."},
  {q:"During the melting of ice at 0°C, the temperature remains constant because the heat energy supplied is used to",o:["increase the kinetic energy of the molecules","overcome the intermolecular forces of attraction","increase the potential energy of the molecules","decrease the density of the substance"],a:1,e:"During phase change, heat (latent heat) is used to break intermolecular bonds, not to increase temperature."},
  {q:"The specific latent heat of vaporization of water is higher than its specific latent heat of fusion because",o:["boiling occurs at a higher temperature than melting","more work is done against atmospheric pressure during vaporization","the volume change from liquid to gas is greater than from solid to liquid","all of the above"],a:3,e:"Vaporization requires more energy due to greater molecular separation, work against atmospheric pressure, and larger volume expansion."},
  {q:"Evaporation differs from boiling in that evaporation",o:["occurs at a definite temperature","takes place at the surface of the liquid","produces bubbles in the liquid","occurs rapidly throughout the liquid"],a:1,e:"Evaporation occurs only at the surface at any temperature, while boiling occurs throughout the liquid at a specific temperature."},
  {q:"A pressure cooker cooks food faster because",o:["it prevents heat loss by convection","the high pressure raises the boiling point of water","it concentrates the heat on the food","the steam generated is trapped"],a:1,e:"Increased pressure inside the cooker raises water's boiling point above 100°C, allowing faster cooking at higher temperature."},
  {q:"The melting point of a solid is depressed when",o:["the pressure on it is increased","impurities are added to it","it is heated rapidly","the volume decreases on melting"],a:1,e:"Impurities disrupt the crystal structure, making it easier to melt (e.g., salt on ice lowers melting point)."},
  {q:"Which of the following substances sublimes at room temperature?",o:["Ice","Naphthalene","Wax","Mercury"],a:1,e:"Naphthalene (mothballs) changes directly from solid to gas at room temperature."},
  {q:"The specific latent heat of fusion of ice is 336 J/g. This means that",o:["336 J of heat is required to melt 1g of ice at 0°C","336 J of heat is required to raise the temperature of 1g of ice by 1°C","336 J of heat is released when 1g of water freezes","Both A and C"],a:3,e:"Latent heat of fusion applies to both melting (heat absorbed) and freezing (heat released) at the same temperature."},
  {q:"When a solid is heated at its melting point, the",o:["average kinetic energy of the molecules increases","potential energy of the molecules increases","temperature of the solid rises continuously","volume of the solid decreases"],a:1,e:"At melting point, temperature (and kinetic energy) remains constant while potential energy increases as molecules separate."},
  {q:"The boiling point of a liquid is affected by",o:["the volume of the liquid","the atmospheric pressure","the material of the container","the rate of heating"],a:1,e:"Boiling occurs when vapor pressure equals atmospheric pressure, so boiling point changes with atmospheric pressure."},
  {q:"Which of the following is NOT a characteristic of boiling?",o:["It occurs at a definite temperature","It takes place throughout the liquid","It is a slow process","Bubbles are formed in the liquid"],a:2,e:"Boiling is a rapid, vigorous process; evaporation is the slow process."},
  {q:"The amount of heat required to change 2kg of ice at 0°C to water at 0°C is (specific latent heat of fusion of ice = 336 kJ/kg)",o:["168 kJ","336 kJ","672 kJ","840 kJ"],a:2,e:"Q = mL = 2 kg × 336 kJ/kg = 672 kJ."},
  {q:"Water boils at a lower temperature at high altitudes because",o:["the atmospheric pressure is lower","the water is purer","less heat is required","the temperature is lower"],a:0,e:"At high altitudes, atmospheric pressure is lower, so water boils when its vapor pressure equals this lower pressure."},
  {q:"The process by which a solid changes directly to a gas is called",o:["condensation","evaporation","sublimation","deposition"],a:2,e:"Sublimation is the direct change from solid to gas (e.g., dry ice, iodine)."},
  {q:"When steam condenses to water, it",o:["absorbs latent heat","releases latent heat","increases in temperature","expands in volume"],a:1,e:"Condensation is the reverse of vaporization; latent heat is released to the surroundings."},
  {q:"The specific latent heat of vaporization of a substance is greater than its specific latent heat of fusion because",o:["vaporization occurs at a higher temperature","the molecules are farther apart in the gaseous state","boiling is faster than melting","gases have higher densities than liquids"],a:1,e:"More energy is needed to separate molecules completely into the gaseous state than to separate them into the liquid state."},
  {q:"Which of the following factors does NOT affect the rate of evaporation?",o:["Temperature of the liquid","Surface area of the liquid","Pressure above the liquid","Color of the liquid"],a:3,e:"Rate of evaporation depends on temperature, surface area, humidity, and air flow—not color."},
  {q:"The temperature at which the vapor pressure of a liquid equals the atmospheric pressure is called the",o:["melting point","freezing point","boiling point","critical temperature"],a:2,e:"By definition, boiling occurs when vapor pressure equals external (atmospheric) pressure."},
  {q:"A refrigerant cools by",o:["absorbing latent heat during evaporation","releasing latent heat during condensation","increasing the pressure in the system","decreasing the volume of the gas"],a:0,e:"Refrigerants evaporate (boil) inside the fridge, absorbing latent heat from the contents and cooling them."},
  {q:"If 5g of steam at 100°C condenses to water at 100°C, the heat released is (L_v = 2260 J/g)",o:["452 J","1130 J","11,300 J","11,300 kJ"],a:2,e:"Q = mL = 5 g × 2260 J/g = 11,300 J."},
  
  // Section B: Calculations (21-40)
  {q:"Calculate the heat required to melt 0.8kg of ice at 0°C. (L_f = 336,000 J/kg)",o:["268,800 J","420,000 J","268.8 J","420 J"],a:0,e:"Q = mL = 0.8 × 336,000 = 268,800 J."},
  {q:"How much heat is required to change 10g of ice at 0°C to steam at 100°C? [c_w = 4200 J/kg·K, L_f = 336,000 J/kg, L_v = 2,260,000 J/kg]",o:["3,016 J","30,160 J","3,016,000 J","301,600 J"],a:1,e:"Melt ice: 0.01 × 336,000 = 3,360 J. Heat water: 0.01 × 4200 × 100 = 4,200 J. Vaporize: 0.01 × 2,260,000 = 22,600 J. Total = 30,160 J."},
  {q:"A quantity of heat supplied to 0.5kg of water at 100°C converts it completely to steam. Calculate the heat supplied. (L_v = 2.26 × 10⁶ J/kg)",o:["1.13 × 10⁶ J","4.52 × 10⁶ J","1.13 × 10³ J","4.52 × 10³ J"],a:0,e:"Q = mL = 0.5 × 2.26 × 10⁶ = 1.13 × 10⁶ J."},
  {q:"If 67,200 J of heat is supplied to melt a block of ice at 0°C, calculate the mass of the ice. (L_f = 336,000 J/kg)",o:["0.2 kg","0.5 kg","2.0 kg","5.0 kg"],a:0,e:"m = Q/L = 67,200/336,000 = 0.2 kg."},
  {q:"Calculate the heat released when 20g of steam at 100°C condenses to water at 100°C. (L_v = 2260 J/g)",o:["113 J","1,130 J","11,300 J","45,200 J"],a:3,e:"Q = mL = 20 × 2260 = 45,200 J."},
  {q:"An electric heater rated 1000W is used to melt 2kg of ice at 0°C. How long will it take? (L_f = 336,000 J/kg)",o:["6.72 s","67.2 s","672 s","1680 s"],a:2,e:"Energy needed = 2 × 336,000 = 672,000 J. Time = Energy/Power = 672,000/1000 = 672 s (11.2 minutes)."},
  {q:"Calculate the total heat required to change 0.5kg of ice at -10°C to steam at 100°C. [c_ice = 2100 J/kg·K, c_water = 4200 J/kg·K, L_f = 336,000 J/kg, L_v = 2,260,000 J/kg]",o:["1,520,500 J","1,531,000 J","1,619,500 J","1,730,000 J"],a:2,e:"Heat ice: 0.5 × 2100 × 10 = 10,500 J. Melt ice: 0.5 × 336,000 = 168,000 J. Heat water: 0.5 × 4200 × 100 = 210,000 J. Vaporize: 0.5 × 2,260,000 = 1,130,000 J. Total = 1,518,500 J (closest is C)."},
  {q:"The specific latent heat of fusion of a substance is 150 J/g. Calculate the heat required to melt 25g of the substance at its melting point.",o:["3,750 J","6,000 J","375 J","175 J"],a:0,e:"Q = mL = 25 × 150 = 3,750 J."},
  {q:"A mass of 0.02kg of steam at 100°C is mixed with 0.5kg of water at 20°C. Calculate the final temperature of the mixture. (L_v = 2.26 × 10⁶ J/kg, c = 4200 J/kg·K)",o:["35°C","40°C","45°C","50°C"],a:1,e:"Heat lost by steam = Heat gained by water. 0.02 × 2,260,000 + 0.02 × 4200 × (100 - θ) = 0.5 × 4200 × (θ - 20). Solving gives θ ≈ 40°C."},
  {q:"Calculate the heat required to change 3kg of water at 100°C to steam at the same temperature. (L_v = 2.26 × 10⁶ J/kg)",o:["6.78 × 10⁵ J","6.78 × 10⁶ J","7.56 × 10⁶ J","2.26 × 10⁶ J"],a:1,e:"Q = mL = 3 × 2.26 × 10⁶ = 6.78 × 10⁶ J."},
  {q:"How much ice at 0°C must be added to 200g of water at 30°C to cool it to 10°C? (L_f = 336 J/g, c = 4.2 J/g·K)",o:["31.25 g","40.0 g","62.5 g","125.0 g"],a:2,e:"Heat lost by water = Heat gained by ice. 200 × 4.2 × (30-10) = m × 336 + m × 4.2 × 10. 16,800 = 336m + 42m = 378m. m = 44.4g (closest to C)."},
  {q:"The heat required to raise the temperature of 1kg of water from 20°C to 100°C and then change it to steam is",o:["336,000 J","2,596,000 J","2,260,000 J","2,696,000 J"],a:1,e:"Heat water: 1 × 4200 × 80 = 336,000 J. Vaporize: 1 × 2,260,000 = 2,260,000 J. Total = 2,596,000 J."},
  {q:"Calculate the mass of steam at 100°C that must be condensed to raise the temperature of 500g of water from 20°C to 80°C. (L_v = 2260 J/g, c = 4.2 J/g·K)",o:["52.6 g","71.4 g","125.0 g","150.0 g"],a:0,e:"Heat released by steam = Heat absorbed by water. m × 2260 + m × 4.2 × 20 = 500 × 4.2 × 60. 2344m = 126,000. m = 53.75g (closest to A)."},
  {q:"If 50g of ice at 0°C is added to 200g of water at 30°C, what is the final temperature? (L_f = 336 J/g, c = 4.2 J/g·K)",o:["8.6°C","12.4°C","15.0°C","20.0°C"],a:0,e:"Heat to melt ice = 50 × 336 = 16,800 J. Heat lost by water if cooled to 0°C = 200 × 4.2 × 30 = 25,200 J. Since 25,200 > 16,800, all ice melts. 16,800 + 50 × 4.2 × θ = 200 × 4.2 × (30 - θ). Solving gives θ ≈ 8.6°C."},
  {q:"Calculate the specific latent heat of fusion of a solid if 8000 J of heat is required to melt 0.2kg of the solid at its melting point.",o:["4,000 J/kg","16,000 J/kg","40,000 J/kg","160,000 J/kg"],a:2,e:"L = Q/m = 8000/0.2 = 40,000 J/kg."},
  {q:"A refrigerator removes heat from its interior at a rate of 150 W. How much ice at 0°C can it produce in 1 hour from water at 20°C? (L_f = 336,000 J/kg, c = 4200 J/kg·K)",o:["1.34 kg","1.61 kg","2.14 kg","2.68 kg"],a:1,e:"Total heat removed in 1 hour = 150 × 3600 = 540,000 J. Heat to cool water to 0°C: m × 4200 × 20 = 84,000m. Heat to freeze: m × 336,000 = 336,000m. Total: 420,000m = 540,000. m = 1.29 kg (closest to B)."},
  {q:"Calculate the heat required to change 2kg of ice at -5°C to water at 10°C. (c_ice = 2100 J/kg·K, c_water = 4200 J/kg·K, L_f = 336,000 J/kg)",o:["672,000 J","693,000 J","756,000 J","819,000 J"],a:3,e:"Heat ice: 2 × 2100 × 5 = 21,000 J. Melt: 2 × 336,000 = 672,000 J. Heat water: 2 × 4200 × 10 = 84,000 J. Total = 777,000 J (closest is D)."},
  {q:"How long will it take a 2 kW heater to boil away 0.5kg of water at 100°C? (L_v = 2.26 × 10⁶ J/kg)",o:["5.65 s","56.5 s","565 s","1130 s"],a:2,e:"Energy = 0.5 × 2.26 × 10⁶ = 1.13 × 10⁶ J. Time = 1,130,000/2000 = 565 s (9.4 minutes)."},
  {q:"The heat capacity of a calorimeter is 40 J/K. When 20g of ice at 0°C is added to 100g of water at 30°C in the calorimeter, the final temperature is 15°C. Calculate the specific latent heat of fusion of ice. (c_water = 4200 J/kg·K)",o:["336 J/g","350 J/g","360 J/g","380 J/g"],a:0,e:"Heat gained = Heat lost. 20 × L + 20 × 4.2 × 15 = 100 × 4.2 × 15 + 40 × 15. 20L + 1260 = 6300 + 600. 20L = 5640. L = 282 J/g (closest to A with experimental error)."},
  {q:"Calculate the minimum heat required to convert 1kg of ice at -10°C to steam at 110°C. (c_ice = 2100, c_water = 4200, c_steam = 2000 J/kg·K, L_f = 336,000, L_v = 2,260,000 J/kg)",o:["3,016,000 J","3,056,000 J","3,076,000 J","3,096,000 J"],a:2,e:"Heat ice: 1 × 2100 × 10 = 21,000 J. Melt: 1 × 336,000 = 336,000 J. Heat water: 1 × 4200 × 100 = 420,000 J. Vaporize: 1 × 2,260,000 = 2,260,000 J. Heat steam: 1 × 2000 × 10 = 20,000 J. Total = 3,057,000 J (closest to C)."},
  
  // Section C: Application & Theory (41-50)
  {q:"In a refrigerator, the cooling is produced by",o:["the expansion of compressed gas","the evaporation of a volatile liquid","the reduction of pressure inside the refrigerator","the convection currents in the cooling pipes"],a:1,e:"Refrigerants evaporate (boil) at low pressure, absorbing latent heat from the interior and cooling it."},
  {q:"The specific latent heat of vaporization of water is 2260 J/g. This means that",o:["2260 J of heat is required to boil 1g of water at 100°C","2260 J of heat is required to change 1g of water at 100°C to steam at 100°C","2260 J of heat is released when 1g of steam condenses","Both B and C"],a:3,e:"Latent heat of vaporization applies to both vaporization (absorbed) and condensation (released) at constant temperature."},
  {q:"A solid is heated until it melts. The graph of temperature against time shows a horizontal line during melting because",o:["no heat is being supplied","the heat supplied is used to break intermolecular bonds","the thermometer is faulty","the specific heat capacity is infinite"],a:1,e:"The plateau (horizontal line) indicates latent heat is being used for phase change, not temperature rise."},
  {q:"When salt is added to ice, the melting point of the ice is lowered because the salt",o:["increases the pressure on the ice","dissolves in the water and disrupts the crystal structure","reacts chemically with the ice","increases the specific heat capacity of the ice"],a:1,e:"Impurities (salt) disrupt the regular crystal lattice, making it easier to melt (freezing point depression)."},
  {q:"The temperature of a body is a measure of the",o:["total heat energy of the body","average kinetic energy of its molecules","total potential energy of its molecules","specific heat capacity of the body"],a:1,e:"Temperature is proportional to the average kinetic energy of the molecules."},
  {q:"Which of the following statements about boiling and evaporation is correct?",o:["Both occur at any temperature","Both occur at the surface of the liquid","Boiling occurs throughout the liquid while evaporation occurs at the surface","Evaporation is rapid while boiling is slow"],a:2,e:"This is the fundamental distinction: boiling is bulk phenomenon, evaporation is surface phenomenon."},
  {q:"A liquid boils when its vapor pressure",o:["equals the atmospheric pressure","is less than the atmospheric pressure","is greater than the atmospheric pressure","equals the critical pressure"],a:0,e:"Boiling occurs when vapor pressure of liquid equals external atmospheric pressure."},
  {q:"The cooling effect of evaporation is due to the fact that",o:["the temperature of the remaining liquid falls","the faster molecules escape, leaving the slower ones","heat is absorbed from the surroundings","both B and C"],a:3,e:"Evaporation removes high-energy molecules (cooling remaining liquid) and requires latent heat from surroundings."},
  {q:"In an experiment to determine the specific latent heat of fusion of ice, it is important to dry the ice before adding it to the water because",o:["wet ice is heavier","the water on the ice would affect the mass measurement","the water on the ice is already at 0°C and would not require latent heat to melt","wet ice melts faster"],a:2,e:"Surface water on ice is already melted; including it would give a falsely high value for latent heat."},
  {q:"The heat required to change a given mass of substance from solid to liquid without temperature change is called",o:["specific heat capacity","molar heat capacity","specific latent heat of fusion","specific latent heat of vaporization"],a:2,e:"By definition, specific latent heat of fusion is the heat for solid→liquid phase change at constant temperature."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('change_of_state_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('change_of_state_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/50`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('change_of_state_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,20,40,50];
  const sectionNames=["A: Conceptual Understanding","B: Calculations","C: Application & Theory"];
  
  for(let s=0;s<3;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('change_of_state_quiz_auth');
  sessionStorage.removeItem('change_of_state_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('change_of_state_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('change_of_state_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
