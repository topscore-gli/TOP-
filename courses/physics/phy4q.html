<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Gravitational Field</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Gravitational Field<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Gravitational Field</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 60 minutes for 60 questions
const CONFIG={TIME:3600,PASS:60};

// Section mapping for 60 questions (6 sections)
const SECTIONS={
  0:"A: Newton's Law of Universal Gravitation",
  12:"B: Gravitational Field Strength",
  24:"C: Gravitational Potential",
  36:"D: Escape Velocity",
  45:"E: Satellites & Orbital Mechanics",
  54:"F: Kepler's Laws & General"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Physics Questions on Gravitational Field
const QUIZ_DATA=[
  // Section A: Newton's Law of Universal Gravitation (1-12)
  {q:"The gravitational force between two masses is 10 N when they are 2 m apart. What is the force when the distance is increased to 4 m?",o:["2.5 N","5.0 N","20 N","40 N"],a:0,e:"F ∝ 1/r². When distance doubles, force becomes (1/2)² = 1/4 of original. 10 × 1/4 = 2.5 N."},
  {q:"Two spheres of masses 100 kg and 400 kg are placed with their centers 2 m apart. Calculate the gravitational force between them. [G = 6.67 × 10⁻¹¹ Nm²kg⁻²]",o:["6.67 × 10⁻⁷ N","6.67 × 10⁻⁸ N","1.33 × 10⁻⁶ N","2.67 × 10⁻⁷ N"],a:0,e:"F = Gm₁m₂/r² = (6.67×10⁻¹¹)(100)(400)/4 = 6.67×10⁻⁷ N."},
  {q:"The gravitational constant G has dimensions of:",o:["M⁻¹L³T⁻²","ML³T⁻²","M⁻¹L²T⁻²","MLT⁻²"],a:0,e:"From F = Gm₁m₂/r², G = Fr²/m₁m₂. Dimensions: [MLT⁻²][L²]/[M²] = M⁻¹L³T⁻²."},
  {q:"Two protons in a nucleus are approximately 10⁻¹⁵ m apart. If the mass of a proton is 1.67 × 10⁻²⁷ kg, calculate the gravitational force between them.",o:["1.86 × 10⁻³⁴ N","1.86 × 10⁻³⁵ N","3.72 × 10⁻³⁴ N","3.72 × 10⁻³⁵ N"],a:1,e:"F = (6.67×10⁻¹¹)(1.67×10⁻²⁷)²/(10⁻¹⁵)² = 1.86×10⁻³⁵ N. This shows gravity is negligible at nuclear level."},
  {q:"If the mass of a planet is doubled and its radius is also doubled, the acceleration due to gravity on its surface will:",o:["Remain unchanged","Be doubled","Be halved","Be quadrupled"],a:2,e:"g = GM/R². New g' = G(2M)/(2R)² = 2GM/4R² = (1/2)g."},
  {q:"Three masses of 2 kg each are placed at the vertices of an equilateral triangle of side 1 m. The net gravitational force on any one mass is:",o:["2Gm²","√3Gm²","2√3Gm²","3√3Gm²"],a:1,e:"Force from each neighbor = Gm²/1² = Gm². Angle between forces = 60°. Resultant = √(F²+F²+2FFcos60°) = √3F = √3Gm²."},
  {q:"The gravitational force between two objects is inversely proportional to:",o:["The product of their masses","The square of the distance between them","The distance between them","The sum of their masses"],a:1,e:"Newton's law states F ∝ 1/r² (inverse square law)."},
  {q:"Two identical spheres of mass M and radius R are touching each other. The gravitational force between them is:",o:["GM²/R²","GM²/4R²","GM²/2R²","2GM²/R²"],a:1,e:"Distance between centers = 2R. F = GM²/(2R)² = GM²/4R²."},
  {q:"The ratio of gravitational force to electrostatic force between two electrons is approximately:",o:["10⁻⁴³","10⁻³⁶","10⁻²⁸","10⁻²³"],a:0,e:"F_grav/F_elec = (Gm²)/(ke²) ≈ 10⁻⁴³, showing gravity is extremely weak compared to electromagnetism."},
  {q:"If the distance between two masses is reduced by 40%, the gravitational force between them increases by a factor of:",o:["25/9","5/3","9/25","3/5"],a:0,e:"New distance = 0.6r = 3r/5. New force ∝ 1/(3r/5)² = 25/9r². Factor = 25/9."},
  {q:"A mass m is placed at point P where the gravitational field is zero due to two masses M and 4M separated by distance d. The distance of P from M is:",o:["d/3","d/2","2d/3","3d/4"],a:0,e:"Let x be distance from M. GM/x² = G4M/(d-x)². Solving: (d-x)² = 4x² → d-x = 2x → x = d/3."},
  {q:"The weight of an object on Earth is 600 N. What is its weight on a planet with twice Earth's mass and half Earth's radius?",o:["1200 N","2400 N","4800 N","9600 N"],a:2,e:"W = mg = GMm/R². New W' = G(2M)m/(R/2)² = 2GMm/(R²/4) = 8GMm/R² = 8 × 600 = 4800 N."},
  
  // Section B: Gravitational Field Strength (13-24)
  {q:"Calculate the gravitational field strength at a height of R/2 above Earth's surface, where R is Earth's radius and g is surface gravity.",o:["g/2","4g/9","2g/3","g/4"],a:1,e:"g_h = g[R/(R+h)]² = g[R/(3R/2)]² = g(2/3)² = 4g/9."},
  {q:"The acceleration due to gravity at Earth's surface is 9.8 m/s². At what height above the surface will it be 4.9 m/s²?",o:["R/2","R(√2 - 1)","R√2","2R"],a:1,e:"g/2 = g[R/(R+h)]² → 1/2 = [R/(R+h)]² → R+h = R√2 → h = R(√2-1)."},
  {q:"A planet has mass 8 times Earth's mass and radius 2 times Earth's radius. The gravitational field strength on its surface is:",o:["g","2g","4g","8g"],a:1,e:"g' = G(8M)/(2R)² = 8GM/4R² = 2g."},
  {q:"The gravitational field strength inside a uniform spherical shell is:",o:["Zero","Constant","Proportional to distance from center","Inversely proportional to distance from center"],a:0,e:"By Gauss's law for gravity, field inside a uniform spherical shell is zero."},
  {q:"At what depth below Earth's surface is the gravitational field strength half its surface value?",o:["R/4","R/2","3R/4","R/3"],a:1,e:"Inside Earth, g_d = g(1-d/R). For g/2: 1/2 = 1-d/R → d/R = 1/2 → d = R/2."},
  {q:"The gravitational field strength at a point is defined as:",o:["Force per unit charge","Force per unit mass","Work done per unit charge","Work done per unit mass"],a:1,e:"g = F/m, the force experienced by a unit test mass."},
  {q:"If Earth's mass were doubled without changing its radius, the period of a simple pendulum would:",o:["Remain unchanged","Increase by √2","Decrease by √2","Double"],a:2,e:"T = 2π√(L/g). If g doubles, T becomes T/√2 (decreases by factor √2)."},
  {q:"The variation of g with distance r from Earth's center follows:",o:["Linear decrease for all r","Linear decrease inside, inverse square outside","Constant inside, inverse square outside","Inverse square for all r"],a:1,e:"Inside (r<R): g ∝ r (linear). Outside (r>R): g ∝ 1/r²."},
  {q:"A body weighs 63 N on Earth's surface. How much will it weigh at distance 3R from Earth's center?",o:["7 N","9 N","21 N","28 N"],a:0,e:"W = GMm/r². At r=3R: W' = 63×(R/3R)² = 63/9 = 7 N."},
  {q:"The SI unit of gravitational field strength is:",o:["N","N/kg","J/kg","kg/m"],a:1,e:"g = F/m, so unit is N/kg, equivalent to m/s²."},
  {q:"Two planets P and Q have the same density. If P has twice the radius of Q, the ratio of gravitational field strength on their surfaces g_P:g_Q is:",o:["1:2","2:1","1:4","4:1"],a:1,e:"M = (4/3)πR³ρ. g = GM/R² = (4/3)GπRρ. So g ∝ R. If R_P = 2R_Q, then g_P = 2g_Q."},
  {q:"The gravitational field strength at the center of Earth is:",o:["Infinite","Maximum","Zero","Same as at surface"],a:2,e:"At center, mass is distributed symmetrically in all directions; gravitational forces cancel out."},
  
  // Section C: Gravitational Potential (25-36)
  {q:"The gravitational potential at Earth's surface is -6.25 × 10⁷ J/kg. What is the potential at height R above surface?",o:["-3.125 × 10⁷ J/kg","-1.56 × 10⁷ J/kg","-12.5 × 10⁷ J/kg","Zero"],a:0,e:"V = -GM/r. At surface: V_s = -GM/R. At height R: r=2R, V = -GM/2R = V_s/2 = -3.125×10⁷ J/kg."},
  {q:"The work done in taking a 2 kg mass from Earth's surface to infinity is:",o:["-6.25 × 10⁷ J","6.25 × 10⁷ J","-12.5 × 10⁷ J","12.5 × 10⁷ J"],a:3,e:"Work = m(V∞ - V_s) = 2[0 - (-6.25×10⁷)] = 12.5×10⁷ J."},
  {q:"Gravitational potential is always negative because:",o:["Gravity is always attractive","Work is done against the field","The reference point is at infinity","All of the above"],a:3,e:"Potential is negative because: (1) gravity is attractive, (2) work must be done against it to reach infinity, and (3) zero potential is defined at infinity."},
  {q:"The gravitational potential at distance r from a mass M is V. At distance 2r, the potential is:",o:["V/4","V/2","2V","4V"],a:1,e:"V = -GM/r. At 2r: V' = -GM/2r = V/2."},
  {q:"Calculate the escape velocity from a planet with mass M and radius R, given that g = GM/R².",o:["√(gR)","√(2gR)","2√(gR)","gR"],a:1,e:"v_esc = √(2GM/R) = √(2gR)."},
  {q:"The binding energy of a mass m on Earth's surface is:",o:["GMm/R","-GMm/R","GMm/2R","-GMm/2R"],a:0,e:"Binding energy = -U = -(-GMm/R) = GMm/R. This is the energy needed to remove the mass to infinity."},
  {q:"A rocket is launched from Earth's surface with kinetic energy equal to half the magnitude of its potential energy. The rocket will:",o:["Escape Earth's gravity","Orbit Earth in a circle","Rise to a maximum height and fall back","Escape to infinity with zero velocity"],a:2,e:"Total energy = KE + PE = ½|PE| - |PE| = -½|PE| < 0. Negative total energy means bound orbit; rocket will reach max height and return."},
  {q:"The gravitational potential difference between two points is 10 J/kg. The work done in moving a 5 kg mass between these points is:",o:["2 J","5 J","50 J","100 J"],a:2,e:"W = mΔV = 5 × 10 = 50 J."},
  {q:"The dimension of gravitational potential is:",o:["MLT⁻²","ML²T⁻²","L²T⁻²","M⁻¹L²T⁻²"],a:2,e:"V = -GM/r. Dimensions: [L³T⁻²M⁻¹][M][L⁻¹] = L²T⁻². Or from V = work/mass: [ML²T⁻²]/[M] = L²T⁻²."},
  {q:"At what distance from Earth's center is the gravitational potential -10⁷ J/kg, given surface potential is -6.25 × 10⁷ J/kg?",o:["R/6.25","6.25R","R/2","2R"],a:1,e:"V ∝ 1/r. If V = V_s/6.25, then r = 6.25R."},
  {q:"The total energy of a satellite in circular orbit is:",o:["Equal to its kinetic energy","Equal to its potential energy","Half its potential energy","Twice its kinetic energy"],a:2,e:"For circular orbit: KE = ½|PE| and PE = -2KE. Total E = KE + PE = KE - 2KE = -KE = ½PE."},
  {q:"Which graph correctly represents the variation of gravitational potential V with distance r from a mass M?",o:["V increasing linearly with r","V decreasing linearly with r","V proportional to -1/r","V proportional to 1/r²"],a:2,e:"V = -GM/r, so V vs r is a curve approaching zero asymptotically, negative for all finite r."},
  
  // Section D: Escape Velocity (37-45)
  {q:"The escape velocity from Earth is approximately:",o:["7.9 km/s","11.2 km/s","16.7 km/s","3.1 km/s"],a:1,e:"v_esc = √(2GM/R) ≈ 11.2 km/s. (7.9 km/s is orbital velocity, 16.7 km/s is solar escape velocity)."},
  {q:"If Earth's radius contracts to half its present value without change in mass, the escape velocity would:",o:["Remain unchanged","Increase by √2","Double","Halve"],a:1,e:"v_esc ∝ 1/√R. If R becomes R/2, v_esc becomes √2 times original."},
  {q:"The escape velocity from a planet depends on:",o:["Mass of the escaping body","Direction of projection","Mass and radius of the planet","Atmospheric conditions"],a:2,e:"v_esc = √(2GM/R), depending only on planet's mass and radius, not on the projectile."},
  {q:"A planet has twice Earth's radius and the same density. Its escape velocity is:",o:["Same as Earth's","√2 times Earth's","2 times Earth's","4 times Earth's"],a:2,e:"v_esc = √(2GM/R) = √(2G(4/3)πR³ρ/R) = √(8Gπρ/3) × R. Since ρ is constant, v_esc ∝ R. If R doubles, v_esc doubles."},
  {q:"The ratio of escape velocity to orbital velocity for a satellite near Earth's surface is:",o:["1:1","1:√2","√2:1","2:1"],a:2,e:"v_esc = √(2GM/R), v_orb = √(GM/R). Ratio = √2:1."},
  {q:"A body is projected upward with velocity equal to half the escape velocity. The maximum height reached in terms of R is:",o:["R/3","R/2","R","2R"],a:0,e:"Using energy conservation: ½m(v_esc/2)² - GMm/R = -GMm/(R+h). With v_esc² = 2GM/R: GMm/4R - GMm/R = -GMm/(R+h). Solving: h = R/3."},
  {q:"The escape velocity from the Moon is about 2.4 km/s because:",o:["The Moon has no atmosphere","The Moon's mass is smaller than Earth's","The Moon is closer to the Sun","The Moon rotates slowly"],a:1,e:"v_esc = √(2GM/R). Moon has smaller mass (and radius) than Earth, giving lower escape velocity."},
  {q:"If the kinetic energy of a body is equal to its gravitational potential energy on Earth's surface, the body will:",o:["Orbit Earth in a circle","Escape to infinity with zero velocity","Rise to height R and return","Escape to infinity with residual velocity"],a:3,e:"KE = |PE| means total energy = KE + PE = |PE| - |PE| = 0. Body escapes to infinity with zero energy, but since KE > 0 initially, it has residual velocity at infinity."},
  {q:"The escape velocity from a black hole is:",o:["Equal to speed of light","Greater than speed of light","Less than speed of light","Zero"],a:1,e:"By definition, a black hole has escape velocity exceeding the speed of light, making it 'black.'"},
  
  // Section E: Satellites & Orbital Mechanics (46-54)
  {q:"A satellite orbits Earth at height R above the surface. Its orbital period is:",o:["2π√(R³/GM)","2π√(8R³/GM)","2π√(27R³/GM)","2π√(64R³/GM)"],a:1,e:"r = 2R (from center). T² = 4π²r³/GM = 4π²(8R³)/GM. T = 2π√(8R³/GM)."},
  {q:"The orbital velocity of a satellite in circular orbit is independent of:",o:["Mass of the central body","Radius of the orbit","Mass of the satellite","Gravitational constant"],a:2,e:"v = √(GM/r), independent of satellite's mass (cancels out in derivation)."},
  {q:"A geostationary satellite orbits at approximately:",o:["640 km above surface","6,400 km above surface","36,000 km above surface","384,000 km above surface"],a:2,e:"Geostationary orbit radius ≈ 42,400 km from center, so height ≈ 36,000 km above surface."},
  {q:"Two satellites A and B orbit Earth in circular orbits of radii R and 4R respectively. The ratio of their periods T_A:T_B is:",o:["1:4","1:8","1:16","1:64"],a:1,e:"By Kepler's 3rd law: T² ∝ r³. (T_B/T_A)² = (4R/R)³ = 64. So T_B/T_A = 8, ratio = 1:8."},
  {q:"The total energy of a satellite in circular orbit of radius r is:",o:["-GMm/2r","-GMm/r","GMm/2r","GMm/r"],a:0,e:"E = KE + PE = ½mv² - GMm/r = ½(GMm/r) - GMm/r = -GMm/2r."},
  {q:"A satellite in elliptical orbit has its maximum speed at:",o:["Apogee (farthest point)","Perigee (closest point)","When crossing the minor axis","When potential energy is maximum"],a:1,e:"By conservation of angular momentum (and Kepler's 2nd law), speed is maximum when closest to Earth (perigee)."},
  {q:"The parking orbit for a geostationary satellite must be:",o:["Over the poles","Over the equator","At 45° latitude","Any latitude"],a:1,e:"Must be equatorial to remain fixed over one point (otherwise it would appear to move north-south)."},
  {q:"A satellite moves from a high orbit to a lower orbit. Its speed:",o:["Decreases","Increases","Remains constant","Becomes zero"],a:1,e:"v = √(GM/r). As r decreases, v increases. Satellite gains kinetic energy as it loses potential energy."},
  {q:"The minimum energy required to launch a satellite of mass m into circular orbit close to Earth's surface is:",o:["mgR","½mgR","¼mgR","2mgR"],a:1,e:"Energy on surface = -GMm/R = -mgR. Energy in orbit = -GMm/2R = -½mgR. Energy needed = -½mgR - (-mgR) = ½mgR."},
  
  // Section F: Kepler's Laws & General (55-60)
  {q:"Kepler's second law is a consequence of:",o:["Conservation of energy","Conservation of linear momentum","Conservation of angular momentum","Inverse square law of gravity"],a:2,e:"Equal areas in equal times (dA/dt = constant) results from conservation of angular momentum L = mr²ω = constant."},
  {q:"According to Kepler's third law, for planets orbiting the Sun:",o:["T² ∝ r²","T² ∝ r³","T ∝ r²","T ∝ r³"],a:1,e:"T² = 4π²r³/GM, so T² is proportional to r³ for all planets orbiting the same star."},
  {q:"If a planet's orbital period is 8 years, its mean distance from the Sun is (in AU):",o:["2","4","8","16"],a:1,e:"T² = r³ (in years and AU). 64 = r³ → r = 4 AU."},
  {q:"The gravitational force provides the necessary:",o:["Linear momentum for orbital motion","Centripetal force for circular motion","Tangential acceleration","Escape energy"],a:1,e:"For circular orbit: GMm/r² = mv²/r. Gravity provides centripetal force."},
  {q:"Two satellites have orbital periods in ratio 1:8. The ratio of their orbital radii is:",o:["1:2","1:4","1:8","1:16"],a:1,e:"T² ∝ r³. (T₂/T₁)² = (r₂/r₁)³ → 64 = (r₂/r₁)³ → r₂/r₁ = 4."},
  {q:"The most accurate value of G was first determined by:",o:["Newton","Cavendish","Kepler","Galileo"],a:1,e:"Henry Cavendish (1798) used a torsion balance to measure G, known as 'weighing the Earth.'"}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('gravitational_field_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('gravitational_field_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('gravitational_field_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=70?'Outstanding JAMB preparation!':pct>=60?'Good progress, aim higher':pct>=50?'Average, needs more practice':'Study fundamentals thoroughly'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,12,24,36,45,54,60];
  const sectionNames=["A: Newton's Law of Universal Gravitation","B: Gravitational Field Strength","C: Gravitational Potential","D: Escape Velocity","E: Satellites & Orbital Mechanics","F: Kepler's Laws & General"];
  
  for(let s=0;s<6;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('gravitational_field_quiz_auth');
  sessionStorage.removeItem('gravitational_field_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('gravitational_field_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('gravitational_field_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
</body>
