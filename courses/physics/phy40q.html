<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Fiber Optics & Lasers</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Fiber Optics & Lasers<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Fiber Optics & Lasers</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 50:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 50 minutes for 50 questions
const CONFIG={TIME:3000,PASS:60};

// Section mapping for 50 questions (2 sections)
const SECTIONS={
  0:"A: Fiber Optics",
  25:"B: Lasers"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 50 JAMB Physics Questions on Fiber Optics & Lasers
const QUIZ_DATA=[
  // Section A: Fiber Optics (1-25)
  {q:"The principle underlying the transmission of light through optical fibers is",o:["Refraction","Diffraction","Total internal reflection","Polarization"],a:2,e:"Light is trapped inside the fiber core through repeated total internal reflection at the core-cladding boundary."},
  {q:"In an optical fiber, the refractive index of the core compared to the cladding must be",o:["Lower","Higher","Equal","Zero"],a:1,e:"The core must have a higher refractive index (n₁ > n₂) for total internal reflection to occur at the interface."},
  {q:"The critical angle for a glass-air interface is 42°. What is the refractive index of the glass?",o:["1.33","1.41","1.49","1.50"],a:2,e:"Using sin θc = 1/n, therefore n = 1/sin 42° = 1/0.6691 ≈ 1.49"},
  {q:"The angle beyond which total internal reflection occurs is called",o:["Angle of deviation","Critical angle","Polarizing angle","Glancing angle"],a:1,e:"The critical angle is the minimum angle of incidence in the denser medium for which light is totally reflected."},
  {q:"Which layer of an optical fiber protects the core and cladding from damage?",o:["Buffer coating","Jacket","Strength member","Central tube"],a:0,e:"The buffer coating is the protective plastic layer surrounding the cladding."},
  {q:"In fiber optics, the acceptance cone is related to",o:["Numerical aperture","Wavelength of light","Fiber diameter","Critical angle only"],a:0,e:"The acceptance cone defines the maximum angle at which light can enter the fiber, directly related to numerical aperture (NA = sin θmax)."},
  {q:"A fiber with a very small core diameter that allows only one light path is called",o:["Multi-mode fiber","Step-index fiber","Single-mode fiber","Graded-index fiber"],a:2,e:"Single-mode fibers (8-10 μm core) support only one propagation mode, eliminating modal dispersion."},
  {q:"The formula for numerical aperture is",o:["√(n₁ + n₂)","√(n₁² - n₂²)","√(n₁² + n₂²)","(n₁ - n₂)/n₁"],a:1,e:"NA = √(n₁² - n₂²) where n₁ = core refractive index, n₂ = cladding refractive index."},
  {q:"Which phenomenon causes signal degradation in multi-mode fibers due to different path lengths?",o:["Absorption","Modal dispersion","Scattering","Polarization"],a:1,e:"Modal dispersion occurs because different modes travel different distances, arriving at different times."},
  {q:"The refractive index of core and cladding are 1.50 and 1.48 respectively. Calculate the critical angle.",o:["78.5°","80.6°","82.2°","84.3°"],a:1,e:"sin θc = n₂/n₁ = 1.48/1.50 = 0.9867, therefore θc = sin⁻¹(0.9867) ≈ 80.6°"},
  {q:"Which is NOT an advantage of fiber optics over copper cables?",o:["Higher bandwidth","Immunity to EMI","Lower cost per meter","Lighter weight"],a:2,e:"Fiber optic cables are generally more expensive per meter than copper cables, though costs have decreased."},
  {q:"In graded-index fiber, the refractive index",o:["Is uniform throughout","Varies gradually from center to edge","Changes abruptly at the boundary","Is lower in the center than at the edge"],a:1,e:"The refractive index is highest at the center and decreases gradually toward the cladding, reducing modal dispersion."},
  {q:"The speed of light in a fiber core with refractive index 1.5 is approximately",o:["1.0 × 10⁸ m/s","2.0 × 10⁸ m/s","3.0 × 10⁸ m/s","4.5 × 10⁸ m/s"],a:1,e:"v = c/n = (3 × 10⁸)/1.5 = 2.0 × 10⁸ m/s"},
  {q:"Which medical application uses fiber optics for internal examination?",o:["X-ray imaging","Endoscopy","MRI scanning","Ultrasound"],a:1,e:"Endoscopes use fiber optic bundles to transmit light into and images out of body cavities."},
  {q:"Light traveling through an optical fiber undergoes repeated",o:["Refraction","Reflection at angles less than critical angle","Total internal reflection","Diffraction"],a:2,e:"The light bounces off the core-cladding interface through total internal reflection."},
  {q:"The main cause of signal loss in optical fibers over long distances is",o:["Total internal reflection","Attenuation","Numerical aperture","Acceptance angle"],a:1,e:"Attenuation (absorption and scattering) gradually weakens the light signal over distance."},
  {q:"An optical fiber has core index 1.60 and cladding index 1.58. Its numerical aperture is approximately",o:["0.16","0.25","0.32","0.40"],a:1,e:"NA = √(1.60² - 1.58²) = √(2.56 - 2.4964) = √0.0636 ≈ 0.252"},
  {q:"Which type of fiber is best for long-distance, high-speed communication?",o:["Multi-mode step-index","Multi-mode graded-index","Single-mode","Plastic optical fiber"],a:2,e:"Single-mode fibers eliminate modal dispersion and have lower attenuation, ideal for long distances."},
  {q:"The condition for total internal reflection requires light to travel from",o:["Rarer to denser medium","Denser to rarer medium","Any medium to vacuum","Vacuum to any medium"],a:1,e:"Light must travel from a medium with higher refractive index to one with lower refractive index."},
  {q:"In fiber optic communication, information is carried as",o:["Electric current variations","Light intensity variations","Magnetic field changes","Sound waves"],a:1,e:"Information is encoded as variations in the intensity (or phase) of the light signal."},
  {q:"What happens to light that enters a fiber at an angle greater than the acceptance angle?",o:["It travels faster","It escapes into the cladding","It undergoes TIR more efficiently","It creates interference patterns"],a:1,e:"Light entering beyond the acceptance angle refracts out of the core into the cladding and is lost."},
  {q:"The refractive indices of water and glass are 1.33 and 1.50 respectively. The critical angle for light passing from glass to water is",o:["48.8°","56.4°","62.5°","71.2°"],a:2,e:"sin θc = n_water/n_glass = 1.33/1.50 = 0.8867, θc = sin⁻¹(0.8867) ≈ 62.5°"},
  {q:"Which material is commonly used for the core of optical fibers?",o:["Plastic only","Glass or plastic","Copper","Aluminum"],a:1,e:"Both ultra-pure glass (silica) and special plastics are used depending on application requirements."},
  {q:"The main reason fiber optics are preferred for LANs is their",o:["Low cost","High bandwidth and immunity to interference","Ease of installation","Durability under tension"],a:1,e:"High data capacity and immunity to electromagnetic interference make them ideal for networks."},
  {q:"If the angle of incidence in a denser medium is 50° and the critical angle is 45°, what occurs?",o:["Refraction only","Total internal reflection","Diffraction","Polarization"],a:1,e:"Since 50° > 45° (critical angle), total internal reflection occurs."},
  
  // Section B: Lasers (26-50)
  {q:"LASER stands for",o:["Light Amplification by Spontaneous Emission of Radiation","Light Amplification by Stimulated Emission of Radiation","Light Absorption by Stimulated Emission of Radiation","Light Amplification by Systematic Emission of Radiation"],a:1,e:"LASER = Light Amplification by Stimulated Emission of Radiation."},
  {q:"The process that produces coherent light in a laser is",o:["Spontaneous emission","Stimulated emission","Absorption","Scattering"],a:1,e:"Stimulated emission produces photons identical in phase, direction, and wavelength (coherent light)."},
  {q:"In stimulated emission, an incident photon causes an excited atom to emit a photon that is",o:["Of lower energy","Identical to the incident photon","Of different wavelength","Absorbed immediately"],a:1,e:"The emitted photon has the same phase, direction, frequency, and polarization as the stimulating photon."},
  {q:"The condition where more atoms are in excited state than ground state is called",o:["Thermal equilibrium","Population inversion","Ground state dominance","Metastable equilibrium"],a:1,e:"Population inversion (N_excited > N_ground) is essential for laser action and requires external energy input."},
  {q:"Which energy level allows excited atoms to 'wait' long enough for stimulated emission to occur?",o:["Ground state","Excited state","Metastable state","Ionization level"],a:2,e:"Metastable states have longer lifetimes (10⁻³ s vs. normal 10⁻⁸ s), enabling population buildup."},
  {q:"The energy source used to excite atoms in a laser is called",o:["Pumping mechanism","Optical cavity","Resonator","Amplifier"],a:0,e:"Pumping (optical, electrical, or chemical) provides energy to achieve population inversion."},
  {q:"Which property distinguishes laser light from ordinary light?",o:["It travels slower","It is coherent and monochromatic","It has lower energy","It requires a medium"],a:1,e:"Laser light is coherent (in phase), monochromatic (single wavelength), and directional."},
  {q:"In a ruby laser, the active medium is",o:["Helium-neon gas mixture","Ruby crystal with chromium ions","Semiconductor diode","Organic dye"],a:1,e:"Ruby (Al₂O₃ with Cr³⁺ ions) is the solid-state active medium in the first working laser (1960)."},
  {q:"The function of the partially silvered mirror in a laser cavity is to",o:["Reflect all light back","Allow some light to escape as the laser beam","Absorb excess energy","Focus the beam"],a:1,e:"One mirror is 100% reflective; the other is partially transparent (99%) to output the coherent beam."},
  {q:"Which laser type uses a p-n junction as the active medium?",o:["Ruby laser","He-Ne laser","Semiconductor laser","CO₂ laser"],a:2,e:"Semiconductor (diode) lasers use electron-hole recombination at a p-n junction to produce laser light."},
  {q:"The wavelength of light emitted by a laser depends on",o:["The mirror separation only","The energy difference between levels","The pumping power only","The cavity temperature"],a:1,e:"Using E = hc/λ, the wavelength is determined by the energy gap between lasing levels: λ = hc/ΔE."},
  {q:"Spontaneous emission differs from stimulated emission in that spontaneous emission",o:["Requires an external photon","Occurs randomly without external trigger","Produces coherent light","Only occurs in solids"],a:1,e:"Spontaneous emission is random and produces incoherent light; stimulated emission requires an incident photon."},
  {q:"A laser beam can be used for bloodless surgery because it",o:["Cauterizes tissue while cutting","Is cool","Dissolves blood cells","Prevents pain"],a:0,e:"The intense heat simultaneously cuts and seals blood vessels (cauterization), minimizing bleeding."},
  {q:"Which is NOT a characteristic of laser light?",o:["High directionality","High intensity","Polychromatic nature","Coherence"],a:2,e:"Laser light is monochromatic (single color), not polychromatic (many colors)."},
  {q:"The metastable state in a three-level laser system is located",o:["Below the ground state","Between ground and excited states","Above the excited state","At the ionization level"],a:1,e:"In a three-level laser: Ground state → Pump to excited state → Quickly decay to metastable state → Laser transition to ground."},
  {q:"What color light is typically produced by a He-Ne laser?",o:["Green","Blue","Red (632.8 nm)","Yellow"],a:2,e:"Helium-neon lasers characteristically emit red light at 632.8 nm wavelength."},
  {q:"The process of exciting atoms to achieve population inversion is called",o:["Stimulated absorption","Pumping","Relaxation","Ionization"],a:1,e:"Pumping (optical flash, electrical discharge, etc.) raises atoms to excited states to create population inversion."},
  {q:"Which application uses lasers for reading digital information?",o:["Radar systems","CD/DVD players","Microwave ovens","Radio transmitters"],a:1,e:"CD/DVD players use semiconductor lasers to read pits and lands on optical discs."},
  {q:"In a four-level laser system, the lasing transition occurs between",o:["Ground state and first excited state","Two excited states","Ionized state and ground state","Metastable state and ground state"],a:1,e:"Four-level lasers transition between two excited states (E₃ → E₂), making population inversion easier to achieve."},
  {q:"The divergence of a laser beam refers to its tendency to",o:["Change color","Spread out slightly over distance","Lose coherence","Decrease in intensity only"],a:1,e:"Even laser beams spread slightly due to diffraction; good lasers have very low divergence."},
  {q:"Which laser type is most commonly used in fiber optic communications?",o:["Ruby laser","CO₂ laser","Semiconductor laser diode","Dye laser"],a:2,e:"Compact, efficient semiconductor laser diodes are ideal for fiber optic transmitters."},
  {q:"The coherence length of a laser beam indicates",o:["Its color purity","How far it can travel while maintaining phase relationships","Its maximum power","The cavity length"],a:1,e:"Coherence length is the distance over which the phase remains predictable; lasers have very long coherence lengths."},
  {q:"What safety precaution is essential when using lasers?",o:["Always look into the beam to check alignment","Never look directly into the laser beam","Use without protective eyewear for better visibility","Aim at reflective surfaces for better illumination"],a:1,e:"Direct or reflected laser beams can cause permanent eye damage; safety goggles and beam avoidance are essential."},
  {q:"The efficiency of a laser is defined as the ratio of",o:["Input power to output power","Output laser power to input pump power","Heat generated to light produced","Cavity length to wavelength"],a:1,e:"Efficiency = (Laser power output / Pump power input) × 100%; typical lasers are 1-30% efficient."},
  {q:"Holography requires which property of light that lasers provide?",o:["High speed","Coherence","High temperature","Radioactivity"],a:1,e:"Holography records both amplitude and phase information, requiring the coherent light that lasers produce."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('fiber_laser_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('fiber_laser_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/50`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('fiber_laser_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=55?'Ready for JAMB!':pct>=48?'Good, review weak areas':pct>=40?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,25,50];
  const sectionNames=["A: Fiber Optics","B: Lasers"];
  
  for(let s=0;s<2;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('fiber_laser_quiz_auth');
  sessionStorage.removeItem('fiber_laser_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('fiber_laser_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('fiber_laser_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
