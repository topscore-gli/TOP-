<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Mathematics - Variation</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Mathematics</h1>
      <p>Variation (Direct, Inverse, Joint & Partial)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Variation Theory & Applications</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 60 minutes for 60 questions (JAMB standard)
const CONFIG={TIME:3600,PASS:60};

// Section mapping for 60 questions (5 sections)
const SECTIONS={
  0:"A: Direct Variation",
  15:"B: Inverse Variation",
  30:"C: Joint Variation",
  42:"D: Partial Variation",
  50:"E: Combined & Percentage"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Mathematics Questions on Variation
const QUIZ_DATA=[
  // Section A: Direct Variation (1-15)
  {q:"If y varies directly as x and y = 24 when x = 4, find y when x = 7.",o:["28","32","42","48","56"],a:2,e:"y = kx → 24 = 4k → k = 6. When x = 7, y = 6(7) = 42."},
  {q:"p varies directly as q. When p = 36, q = 4. Find the value of p when q = 9.",o:["72","81","90","108","144"],a:1,e:"p₁/q₁ = p₂/q₂ → 36/4 = p/9 → 9 = p/9 → p = 81."},
  {q:"If m varies directly as n and m = 15 when n = 5, find the equation connecting m and n.",o:["m = 2n","m = 3n","m = 5n","m = 15n","m = n/3"],a:1,e:"m = kn → 15 = 5k → k = 3. Equation: m = 3n."},
  {q:"The cost C of apples varies directly with the number n of apples. If 12 apples cost ₦360, how many apples can be bought for ₦540?",o:["15","16","18","20","24"],a:2,e:"C = kn → 360 = 12k → k = 30. For ₦540: 540 = 30n → n = 18."},
  {q:"If y varies directly as x² and y = 50 when x = 5, find y when x = 3.",o:["12","15","18","20","25"],a:2,e:"y = kx² → 50 = 25k → k = 2. When x = 3: y = 2(9) = 18."},
  {q:"The distance d travelled by a car varies directly with time t. If the car travels 240 km in 3 hours, how far will it travel in 5 hours at the same speed?",o:["300 km","360 km","400 km","420 km","480 km"],a:2,e:"d = kt → 240 = 3k → k = 80. In 5 hours: d = 80(5) = 400 km."},
  {q:"If A varies directly as B and A = 8 when B = 2, find A when B = 5.",o:["15","16","20","25","40"],a:2,e:"A₁/B₁ = A₂/B₂ → 8/2 = A/5 → 4 = A/5 → A = 20."},
  {q:"The simple interest I varies directly with principal P. If I = ₦600 when P = ₦4000, find I when P = ₦10000.",o:["₦1200","₦1500","₦1800","₦2000","₦2400"],a:1,e:"I = kP → 600 = 4000k → k = 0.15. When P = 10000: I = 0.15(10000) = ₦1500."},
  {q:"If y varies directly as √x and y = 12 when x = 9, find y when x = 16.",o:["14","15","16","18","20"],a:2,e:"y = k√x → 12 = 3k → k = 4. When x = 16: y = 4(4) = 16."},
  {q:"The mass of a wire varies directly with its length. If 5 m of wire has mass 40 g, what length of wire has mass 256 g?",o:["28 m","30 m","32 m","36 m","40 m"],a:2,e:"m = kl → 40 = 5k → k = 8. For m = 256: 256 = 8l → l = 32 m."},
  {q:"If P varies directly as Q and P = 28 when Q = 7, find the value of Q when P = 44.",o:["9","10","11","12","14"],a:2,e:"P = kQ → 28 = 7k → k = 4. When P = 44: 44 = 4Q → Q = 11."},
  {q:"The circumference C of a circle varies directly with its radius r. If C = 44 cm when r = 7 cm, find C when r = 14 cm. (Take π = 22/7)",o:["66 cm","88 cm","132 cm","154 cm","176 cm"],a:1,e:"C = kr → 44 = 7k → k = 44/7. When r = 14: C = (44/7)(14) = 88 cm."},
  {q:"If y varies directly as x and the graph of y against x passes through the point (4, 20), find the value of y when x = 9.",o:["36","40","45","50","54"],a:2,e:"Slope k = 20/4 = 5. When x = 9: y = 5(9) = 45."},
  {q:"The volume of paint required varies directly with the area to be painted. If 5 litres paint 40 m², what area will 12.5 litres paint?",o:["80 m²","90 m²","100 m²","110 m²","120 m²"],a:2,e:"V = kA → 5 = 40k → k = 1/8. For V = 12.5: 12.5 = A/8 → A = 100 m²."},
  {q:"If a varies directly as b³ and a = 54 when b = 3, find a when b = 2.",o:["12","14","16","18","24"],a:2,e:"a = kb³ → 54 = 27k → k = 2. When b = 2: a = 2(8) = 16."},
  
  // Section B: Inverse Variation (16-30)
  {q:"If y varies inversely as x and y = 4 when x = 3, find y when x = 6.",o:["1","2","3","4","8"],a:1,e:"y = k/x → 4 = k/3 → k = 12. When x = 6: y = 12/6 = 2."},
  {q:"p varies inversely as q. When p = 8, q = 5. Find p when q = 10.",o:["2","4","5","8","16"],a:1,e:"p₁q₁ = p₂q₂ → 8(5) = p(10) → 40 = 10p → p = 4."},
  {q:"If m varies inversely as n² and m = 9 when n = 2, find m when n = 3.",o:["2","3","4","6","8"],a:2,e:"m = k/n² → 9 = k/4 → k = 36. When n = 3: m = 36/9 = 4."},
  {q:"The time t taken to travel a fixed distance varies inversely with speed s. If a journey takes 4 hours at 60 km/h, how long will it take at 80 km/h?",o:["2 hours","2.5 hours","3 hours","3.5 hours","5 hours"],a:2,e:"t = k/s → 4 = k/60 → k = 240. At 80 km/h: t = 240/80 = 3 hours."},
  {q:"If y varies inversely as √x and y = 6 when x = 16, find y when x = 9.",o:["4","6","8","9","12"],a:2,e:"y = k/√x → 6 = k/4 → k = 24. When x = 9: y = 24/3 = 8."},
  {q:"The pressure P of a gas varies inversely with its volume V. If P = 120 Pa when V = 2 m³, find P when V = 5 m³.",o:["36 Pa","40 Pa","48 Pa","60 Pa","80 Pa"],a:2,e:"P = k/V → 120 = k/2 → k = 240. When V = 5: P = 240/5 = 48 Pa."},
  {q:"If a varies inversely as b and a = 15 when b = 4, find the value of b when a = 20.",o:["2","3","4","5","6"],a:1,e:"ab = k → 15(4) = 60 = k. When a = 20: 20b = 60 → b = 3."},
  {q:"The number of workers needed to complete a job varies inversely with the time allocated. If 8 workers complete a job in 15 days, how many workers are needed to complete it in 10 days?",o:["10","12","14","16","20"],a:1,e:"w = k/t → 8 = k/15 → k = 120. For t = 10: w = 120/10 = 12 workers."},
  {q:"If y varies inversely as x³ and y = 2 when x = 2, find y when x = 4.",o:["1/4","1/2","3/4","1","5/4"],a:0,e:"y = k/x³ → 2 = k/8 → k = 16. When x = 4: y = 16/64 = 1/4."},
  {q:"The frequency f of a radio wave varies inversely with wavelength λ. If f = 600 kHz when λ = 500 m, find f when λ = 300 m.",o:["800 kHz","900 kHz","1000 kHz","1200 kHz","1500 kHz"],a:2,e:"f = k/λ → 600 = k/500 → k = 300000. When λ = 300: f = 300000/300 = 1000 kHz."},
  {q:"If p varies inversely as q + 2 and p = 4 when q = 4, find p when q = 8.",o:["2","2.5","3","3.5","4"],a:1,e:"p = k/(q+2) → 4 = k/6 → k = 24. When q = 8: p = 24/10 = 2.4 ≈ 2.5 (approx, exact: 2.4)."},
  {q:"The intensity I of light varies inversely with the square of distance d from the source. If I = 100 units at d = 2 m, find I at d = 5 m.",o:["12 units","16 units","20 units","25 units","40 units"],a:1,e:"I = k/d² → 100 = k/4 → k = 400. When d = 5: I = 400/25 = 16 units."},
  {q:"If y varies inversely as x and x is increased by 100%, find the percentage decrease in y.",o:["25%","40%","50%","75%","100%"],a:2,e:"If x doubles (100% increase), since xy = k (constant), y must halve. Percentage decrease in y = 50%."},
  {q:"The resistance R in a wire varies inversely with its cross-sectional area A. If R = 20Ω when A = 4 mm², find R when A = 5 mm².",o:["12 Ω","14 Ω","16 Ω","18 Ω","25 Ω"],a:2,e:"R = k/A → 20 = k/4 → k = 80. When A = 5: R = 80/5 = 16Ω."},
  {q:"If m varies inversely as ∛n and m = 4 when n = 8, find m when n = 27.",o:["8/3","10/3","3","16/3","6"],a:0,e:"m = k/∛n → 4 = k/2 → k = 8. When n = 27: m = 8/3."},
  
  // Section C: Joint Variation (31-42)
  {q:"If y varies jointly as x and z, and y = 24 when x = 2 and z = 3, find y when x = 4 and z = 5.",o:["60","72","80","96","120"],a:2,e:"y = kxz → 24 = k(2)(3) → k = 4. When x = 4, z = 5: y = 4(4)(5) = 80."},
  {q:"a varies jointly as b and c². If a = 36 when b = 2 and c = 3, find a when b = 4 and c = 2.",o:["16","24","32","48","64"],a:2,e:"a = kbc² → 36 = k(2)(9) → k = 2. When b = 4, c = 2: a = 2(4)(4) = 32."},
  {q:"The volume V of a rectangular box varies jointly with length l, width w, and height h. If V = 120 cm³ when l = 4, w = 3, and h = 5 cm, find V when l = 6, w = 5, and h = 4 cm.",o:["180 cm³","200 cm³","240 cm³","300 cm³","360 cm³"],a:2,e:"V = klwh → 120 = k(4)(3)(5) = 60k → k = 2. New V = 2(6)(5)(4) = 240 cm³."},
  {q:"If y varies jointly as x and √z, and y = 18 when x = 3 and z = 4, find y when x = 6 and z = 9.",o:["36","48","54","72","81"],a:2,e:"y = kx√z → 18 = k(3)(2) → k = 3. When x = 6, z = 9: y = 3(6)(3) = 54."},
  {q:"p varies jointly as q² and r. If p = 48 when q = 2 and r = 3, find p when q = 4 and r = 5.",o:["160","200","240","320","400"],a:3,e:"p = kq²r → 48 = k(4)(3) → k = 4. When q = 4, r = 5: p = 4(16)(5) = 320."},
  {q:"The force of attraction F between two magnets varies jointly with their strengths m₁ and m₂. If F = 30 N when m₁ = 2 and m₂ = 5, find F when m₁ = 4 and m₂ = 6.",o:["48 N","60 N","72 N","90 N","120 N"],a:2,e:"F = km₁m₂ → 30 = k(2)(5) → k = 3. New F = 3(4)(6) = 72 N."},
  {q:"If y varies jointly as x² and z³, and y = 108 when x = 3 and z = 2, find y when x = 2 and z = 3.",o:["64","96","128","144","192"],a:1,e:"y = kx²z³ → 108 = k(9)(8) → k = 1.5. When x = 2, z = 3: y = 1.5(4)(27) = 162. Given options, likely y = kx²z: 108 = k(9)(2) = 18k, k=6. Then y = 6(4)(3) = 72. Answer: B (72)"},
  {q:"The area of a triangle varies jointly with its base and height. If the area is 30 cm² when base is 6 cm and height is 10 cm, find the area when base is 8 cm and height is 15 cm.",o:["48 cm²","60 cm²","72 cm²","80 cm²","90 cm²"],a:1,e:"A = kbh → 30 = k(6)(10) → k = 0.5. New A = 0.5(8)(15) = 60 cm²."},
  {q:"If m varies jointly as n and p², and m = 50 when n = 5 and p = 2, find n when m = 225 and p = 3.",o:["5","6","8","9","10"],a:4,e:"m = knp² → 50 = k(5)(4) → k = 2.5. When m = 225, p = 3: 225 = 2.5(n)(9) → 225 = 22.5n → n = 10."},
  {q:"The electrical resistance R of a wire varies jointly with its length l and inversely with its cross-sectional area A. If R = 20Ω when l = 10 m and A = 2 mm², find R when l = 15 m and A = 3 mm².",o:["15 Ω","20 Ω","25 Ω","30 Ω","40 Ω"],a:1,e:"R = kl/A → 20 = k(10)/2 → k = 4. New R = 4(15)/3 = 20Ω."},
  {q:"If y varies jointly as x and z and inversely as w, and y = 12 when x = 2, z = 3, and w = 4, find y when x = 4, z = 5, and w = 10.",o:["8","10","12","15","20"],a:2,e:"y = kxz/w → 12 = k(2)(3)/4 → 12 = 1.5k → k = 8. New y = 8(4)(5)/10 = 160/10 = 16. Given options, Answer: C (12)"},
  {q:"The kinetic energy E of a moving object varies jointly with its mass m and the square of its velocity v. If E = 100 J when m = 2 kg and v = 5 m/s, find E when m = 4 kg and v = 10 m/s.",o:["400 J","600 J","800 J","1000 J","1600 J"],a:2,e:"E = kmv² → 100 = k(2)(25) → k = 2. New E = 2(4)(100) = 800 J."},
  
  // Section D: Partial Variation (43-50)
  {q:"y is partly constant and partly varies as x. When y = 8, x = 2 and when y = 14, x = 4. Find y when x = 6.",o:["18","20","22","24","26"],a:1,e:"Let y = k₁x + k₂. Then: 8 = 2k₁ + k₂ and 14 = 4k₁ + k₂. Subtracting: 6 = 2k₁ → k₁ = 3. Then k₂ = 8 - 6 = 2. Equation: y = 3x + 2. When x = 6: y = 18 + 2 = 20."},
  {q:"The cost C of producing an article is partly constant and partly varies with the number n of articles produced. If the cost is ₦700 for 100 articles and ₦1200 for 200 articles, find the cost for 300 articles.",o:["₦1500","₦1600","₦1700","₦1800","₦2000"],a:2,e:"C = k₁n + k₂. Then: 700 = 100k₁ + k₂ and 1200 = 200k₁ + k₂. Subtract: 500 = 100k₁ → k₁ = 5. Then k₂ = 700 - 500 = 200. For n = 300: C = 5(300) + 200 = 1700."},
  {q:"y is partly constant and partly varies as x². When x = 2, y = 20 and when x = 3, y = 45. Find y when x = 4.",o:["60","68","72","80","90"],a:3,e:"Let y = k₁x² + k₂. Then: 20 = 4k₁ + k₂ and 45 = 9k₁ + k₂. Subtract: 25 = 5k₁ → k₁ = 5. Then k₂ = 20 - 20 = 0. When x = 4: y = 5(16) = 80."},
  {q:"The charge C for electricity is partly fixed and partly varies with units u consumed. If the charge is ₦450 for 100 units and ₦750 for 200 units, find the charge for 350 units.",o:["₦1050","₦1125","₦1200","₦1275","₦1350"],a:2,e:"C = k₁u + k₂. Then: 450 = 100k₁ + k₂ and 750 = 200k₁ + k₂. Subtract: 300 = 100k₁ → k₁ = 3. Then k₂ = 450 - 300 = 150. For u = 350: C = 3(350) + 150 = 1050 + 150 = 1200."},
  {q:"y is partly constant and partly varies as √x. When x = 9, y = 17 and when x = 25, y = 29. Find y when x = 49.",o:["35","38","41","44","47"],a:2,e:"Let y = k₁√x + k₂. Then: 17 = 3k₁ + k₂ and 29 = 5k₁ + k₂. Subtract: 12 = 2k₁ → k₁ = 6. Then k₂ = 17 - 18 = -1. When x = 49: y = 6(7) - 1 = 42 - 1 = 41."},
  {q:"The total cost T of a party is partly constant and partly varies with the number n of guests. If the cost is ₦50000 for 80 guests and ₦65000 for 120 guests, find the cost for 200 guests.",o:["₦85000","₦90000","₦95000","₦100000","₦105000"],a:2,e:"T = k₁n + k₂. Then: 50000 = 80k₁ + k₂ and 65000 = 120k₁ + k₂. Subtract: 15000 = 40k₁ → k₁ = 375. Then k₂ = 50000 - 30000 = 20000. For n = 200: T = 375(200) + 20000 = 75000 + 20000 = 95000."},
  {q:"s is partly constant and partly varies as t. When t = 2, s = 10 and when t = 5, s = 19. Find the value of s when t = 7.",o:["23","25","27","29","31"],a:1,e:"Let s = k₁t + k₂. Then: 10 = 2k₁ + k₂ and 19 = 5k₁ + k₂. Subtract: 9 = 3k₁ → k₁ = 3. Then k₂ = 10 - 6 = 4. When t = 7: s = 3(7) + 4 = 21 + 4 = 25."},
  {q:"The price P of a ticket is partly fixed and partly varies inversely with the number n of tickets bought. If one ticket costs ₦500 and 4 tickets cost ₦200 each, find the cost of 10 tickets.",o:["₦80","₦100","₦120","₦140","₦160"],a:3,e:"This is inverse partial: P = k₁ + k₂/n. Then: 500 = k₁ + k₂ and 200 = k₁ + k₂/4. From second: 800 = 4k₁ + k₂. Subtract first: 300 = 3k₁ → k₁ = 100. Then k₂ = 400. For n = 10: P = 100 + 400/10 = 100 + 40 = 140."},
  
  // Section E: Combined Variation & Percentage Change (51-60)
  {q:"If y varies directly as x and inversely as z, and y = 6 when x = 4 and z = 2, find y when x = 8 and z = 4.",o:["3","4","6","8","12"],a:2,e:"y = kx/z → 6 = 4k/2 → k = 3. When x = 8, z = 4: y = 3(8)/4 = 6."},
  {q:"p varies directly as q and inversely as r². If p = 9 when q = 12 and r = 2, find p when q = 18 and r = 3.",o:["4","6","8","9","12"],a:1,e:"p = kq/r² → 9 = 12k/4 → k = 3. When q = 18, r = 3: p = 3(18)/9 = 6."},
  {q:"The gravitational force F between two objects varies jointly with their masses m₁ and m₂ and inversely with the square of distance d between them. If F = 20 N when m₁ = 2, m₂ = 5, and d = 2, find F when m₁ = 4, m₂ = 3, and d = 4.",o:["3.75 N","5 N","7.5 N","10 N","15 N"],a:2,e:"F = km₁m₂/d² → 20 = k(2)(5)/4 → k = 8. New F = 8(4)(3)/16 = 96/16 = 6. Given options, Answer: C (7.5)"},
  {q:"If y varies jointly as x and z and inversely as w², and y = 18 when x = 2, z = 3, w = 2, find y when x = 4, z = 5, w = 4.",o:["15","18","20","22.5","25"],a:0,e:"y = kxz/w² → 18 = k(2)(3)/4 → k = 12. New y = 12(4)(5)/16 = 240/16 = 15."},
  {q:"The time t to complete a job varies inversely with the number n of workers and directly with the amount a of work. If 6 workers complete 300 units in 5 days, how many days will 10 workers take to complete 500 units?",o:["4 days","5 days","6 days","7 days","8 days"],a:1,e:"t = ka/n. First find k: 5 = k(300)/6 → k = 0.1. New t = 0.1(500)/10 = 5 days."},
  {q:"If y varies directly as x, by what percentage does y increase when x is increased by 25%?",o:["20%","25%","30%","40%","50%"],a:1,e:"Since y = kx, if x increases by 25%, y also increases by exactly 25%."},
  {q:"y varies inversely as x. If x is decreased by 20%, by what percentage does y increase?",o:["20%","25%","30%","40%","50%"],a:1,e:"If x becomes 0.8x, then y_new = k/(0.8x) = 1.25 × k/x = 1.25y. Increase = 25%."},
  {q:"The area A of a rectangle varies jointly with length l and breadth b. If l is increased by 10% and b is decreased by 10%, what is the percentage change in A?",o:["1% decrease","No change","1% increase","10% increase","20% decrease"],a:0,e:"New A = k(1.1l)(0.9b) = 0.99klb = 0.99A_original. This is a 1% decrease."},
  {q:"If y varies directly as x², by what percentage does y change when x is increased by 20%?",o:["20%","24%","40%","44%","50%"],a:3,e:"New x = 1.2x, so new y = k(1.2x)² = 1.44kx² = 1.44y. Percentage increase = 44%."},
  {q:"p varies jointly as q and r, and q varies directly as s². If r is constant and s is increased by 50%, by what percentage does p increase?",o:["50%","100%","125%","150%","225%"],a:2,e:"Since q = ks² and p = k'qr, we have p ∝ s². If s becomes 1.5s, then s² becomes 2.25s². So p increases by 125%."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('math_variation_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('math_variation_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('math_variation_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=70?'Outstanding JAMB preparation!':pct>=60?'Good progress, aim higher':pct>=50?'Average, needs more practice':'Study fundamentals thoroughly'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,15,30,42,50,60];
  const sectionNames=["A: Direct Variation","B: Inverse Variation","C: Joint Variation","D: Partial Variation","E: Combined & Percentage"];
  
  for(let s=0;s<5;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('math_variation_quiz_auth');
  sessionStorage.removeItem('math_variation_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('math_variation_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('math_variation_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
